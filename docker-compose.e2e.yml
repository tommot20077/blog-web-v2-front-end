name: blog-e2e

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog_e2e
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d blog_e2e"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass e2e_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "e2e_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: e2e_user
      RABBITMQ_DEFAULT_PASS: e2e_pass
      RABBITMQ_DEFAULT_VHOST: blog
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: e2e_minio
      MINIO_ROOT_PASSWORD: e2e_minio_pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.license.self_generated.type: trial
      ELASTIC_PASSWORD: e2e_elastic_pass
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:e2e_elastic_pass -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    image: blog-backend:e2e
    ports:
      - "9010:9010"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      LOCAL_DB_URL: jdbc:postgresql://postgres:5432/blog_e2e
      LOCAL_DB_USERNAME: e2e_user
      LOCAL_DB_PASSWORD: e2e_pass
      LOCAL_REDIS_HOST: redis
      LOCAL_REDIS_PORT: "6379"
      LOCAL_REDIS_PASSWORD: e2e_pass
      LOCAL_MQ_HOST: rabbitmq
      LOCAL_MQ_PORT: "5672"
      LOCAL_MQ_USERNAME: e2e_user
      LOCAL_MQ_PASSWORD: e2e_pass
      LOCAL_ES_URIS: http://elasticsearch:9200
      LOCAL_ES_USERNAME: elastic
      LOCAL_ES_PASSWORD: e2e_elastic_pass
      LOCAL_MINIO_ENDPOINT: http://minio:9000
      LOCAL_MINIO_ACCESS_KEY: e2e_minio
      LOCAL_MINIO_SECRET_KEY: e2e_minio_pass
      LOCAL_MINIO_BUCKET: blog-files
      APP_CORS_ALLOWED_ORIGINS: http://127.0.0.1:5500
      JWT_EXPIRATION: "86400000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
