<!doctype html>
<html lang="zh-Hant" data-theme="light" data-font="space" data-accent="on" data-cursor="ring">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MY BLOG WEB. — Yuan Luca</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700;900&family=Geist+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>/* ============ TOKENS ============ */
:root {
  /* Light */
  --bg: #f4f4f4;
  --bg-sub: #ededed;
  --surface: #fbfbfb;
  --ink: #0a0a0b;
  --ink-2: #2a2a2c;
  --muted: #6b6b70;
  --muted-2: #9a9aa0;
  --border: rgba(10,10,11,0.10);
  --border-strong: rgba(10,10,11,0.18);
  --divider: rgba(10,10,11,0.08);
  --glass: rgba(255,255,255,0.62);
  --glass-border: rgba(255,255,255,0.9);
  --accent: #5B8DEF;
  --accent-ink: #0a0a0b;
  --shadow-sm: 0 1px 0 rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 1px 0 rgba(0,0,0,0.04), 0 20px 40px -22px rgba(0,0,0,0.18);

  --f-display: "Space Grotesk", "Noto Sans TC", system-ui, sans-serif;
  --f-body: "Space Grotesk", "Noto Sans TC", system-ui, sans-serif;
  --f-mono: "IBM Plex Mono", ui-monospace, monospace;

  --ease: cubic-bezier(.22,1,.36,1);
}
[data-theme="dark"] {
  --bg: #0d0d0f;
  --bg-sub: #111113;
  --surface: #141416;
  --ink: #ededef;
  --ink-2: #c9c9cd;
  --muted: #a6a6ac;
  --muted-2: #7b7b82;
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.18);
  --divider: rgba(255,255,255,0.08);
  --glass: rgba(22,22,24,0.62);
  --glass-border: rgba(255,255,255,0.08);
  --accent: #7BA8F5;
  --accent-ink: #0a0a0b;
  --shadow-sm: 0 1px 0 rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 1px 0 rgba(0,0,0,0.5), 0 20px 60px -22px rgba(0,0,0,0.7);
}

/* Pairing swaps */
[data-font="inter"] {
  --f-display: "Inter Tight", "Noto Sans TC", system-ui, sans-serif;
  --f-body: "Inter Tight", "Noto Sans TC", system-ui, sans-serif;
  --f-mono: "JetBrains Mono", monospace;
}
[data-font="geist"] {
  --f-display: "Geist", "Noto Sans TC", system-ui, sans-serif;
  --f-body: "Geist", "Noto Sans TC", system-ui, sans-serif;
  --f-mono: "Geist Mono", monospace;
}

/* Accent off */
[data-accent="off"] { --accent: var(--ink); }

/* ============ RESET ============ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 0.5s linear, color 0.5s linear;
  cursor: none;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: none; padding: 0; }
img { max-width: 100%; display: block; }
::selection { background: var(--accent); color: var(--accent-ink); }

/* ============ TYPE ============ */
.mono { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
.display-2xl { font-family: var(--f-display); font-weight: 500; font-size: clamp(56px, 8.2vw, 128px); line-height: 0.94; letter-spacing: -0.045em; }
.display-xl { font-family: var(--f-display); font-weight: 500; font-size: clamp(44px, 5.6vw, 84px); line-height: 0.98; letter-spacing: -0.035em; }
.display-l { font-family: var(--f-display); font-weight: 500; font-size: 40px; line-height: 1.02; letter-spacing: -0.025em; }
.heading-m { font-family: var(--f-display); font-weight: 600; font-size: 22px; line-height: 1.25; letter-spacing: -0.008em; }
.body-l { font-size: 16px; line-height: 1.75; }
.body-m { font-size: 14.5px; line-height: 1.7; }
.caption { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }

/* ============ CUSTOM CURSOR ============ */
html[data-cursor="off"] .cursor-dot, html[data-cursor="off"] .cursor-ring { display: none !important; }
html[data-cursor="off"] { cursor: auto; }
html:not([data-cursor="off"]) { cursor: none; }
html:not([data-cursor="off"]) a, html:not([data-cursor="off"]) button, html:not([data-cursor="off"]) input, html:not([data-cursor="off"]) textarea { cursor: none; }

.cursor-dot, .cursor-ring { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; will-change: transform; }

/* VARIANT 1 — ring + dot (default), high contrast */
html[data-cursor="ring"] .cursor-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink); box-shadow: 0 0 0 2px var(--bg); transition: width 0.2s, height 0.2s, background 0.3s; }
html[data-cursor="ring"] .cursor-ring { width: 36px; height: 36px; border: 1.5px solid var(--ink); border-radius: 50%; transition: transform 0.18s var(--ease), width 0.18s, height 0.18s, background 0.2s, border-color 0.3s, opacity 0.2s; opacity: 0.55; }
html[data-cursor="ring"] .cursor-ring.hover { width: 58px; height: 58px; opacity: 1; background: color-mix(in oklab, var(--ink) 8%, transparent); }
html[data-cursor="ring"] .cursor-ring.text { width: 2px; height: 24px; border-radius: 1px; background: var(--ink); border: none; opacity: 1; }

/* VARIANT 2 — crosshair (thin cross + tiny dot) */
html[data-cursor="cross"] .cursor-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink); box-shadow: 0 0 0 1.5px var(--bg); }
html[data-cursor="cross"] .cursor-ring { width: 72px; height: 72px; border: none; border-radius: 0; transition: transform 0.14s var(--ease), opacity 0.2s, width 0.2s, height 0.2s; opacity: 0.55; background:
  linear-gradient(to bottom, var(--ink) 0 1px, transparent 1px) center/1.25px 100% no-repeat,
  linear-gradient(to right, var(--ink) 0 1px, transparent 1px) center/100% 1.25px no-repeat;
}
html[data-cursor="cross"] .cursor-ring.hover { width: 104px; height: 104px; opacity: 1; }
html[data-cursor="cross"] .cursor-ring.text { width: 2px; height: 26px; background: var(--ink); opacity: 1; }

/* VARIANT 3 — big dot (inverted via difference) */
html[data-cursor="dot"] .cursor-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--ink); mix-blend-mode: difference; transition: width 0.2s, height 0.2s; filter: invert(1); }
html[data-cursor="dot"] .cursor-ring { display: none; }
html[data-cursor="dot"] .cursor-dot.hover { width: 44px; height: 44px; }

/* VARIANT 4 — label (text follows cursor) */
html[data-cursor="label"] .cursor-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink); box-shadow: 0 0 0 2px var(--bg); }
html[data-cursor="label"] .cursor-ring { width: auto; height: auto; border: none; border-radius: 999px; padding: 6px 12px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; background: var(--ink); color: var(--bg); opacity: 0; transform-origin: 0 50%; transition: opacity 0.18s var(--ease), transform 0.18s var(--ease); margin-left: 14px; white-space: nowrap; }
html[data-cursor="label"] .cursor-ring::before { content: 'MOVE'; }
html[data-cursor="label"] .cursor-ring.hover { opacity: 1; }
html[data-cursor="label"] .cursor-ring.hover::before { content: 'VIEW →'; }
html[data-cursor="label"] .cursor-ring.text::before { content: 'TYPE'; }
html[data-cursor="label"] .cursor-ring.text { opacity: 1; }

/* legacy fallback (unused, but keeps selectors valid) */
.cursor-ring-legacy-placeholder { width: 32px; height: 32px; border: 1px solid var(--ink); border-radius: 50%; transform: translate(-50%,-50%); transition: transform 0.18s var(--ease), width 0.18s, height 0.18s, background 0.18s, border-color 0.4s; mix-blend-mode: difference; }
.cursor-ring.hover { width: 52px; height: 52px; background: rgba(255,255,255,0.06); }
.cursor-ring.text { width: 3px; height: 24px; border-radius: 1px; background: var(--ink); border: none; }
@media (hover: none) { .cursor-dot, .cursor-ring { display: none; } body { cursor: auto; } a,button { cursor: pointer; } }

/* ============ REVEAL ============ */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s var(--ease), transform 0.9s var(--ease); }
.reveal.in { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: 0.08s; }
.reveal.d2 { transition-delay: 0.16s; }
.reveal.d3 { transition-delay: 0.24s; }
.reveal.d4 { transition-delay: 0.32s; }
.reveal.d5 { transition-delay: 0.40s; }

/* ============ NAVBAR ============ */
.nav-wrap { position: fixed; top: 18px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; pointer-events: none; }
.nav-inner { pointer-events: auto; display: flex; align-items: center; gap: 4px; padding: 8px 8px 8px 18px; border-radius: 999px; background: var(--glass); backdrop-filter: saturate(1.8) blur(22px); -webkit-backdrop-filter: saturate(1.8) blur(22px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-sm); }
.nav-logo { display: flex; align-items: center; gap: 10px; padding: 6px 10px 6px 0; border-right: 1px solid var(--divider); margin-right: 6px; }
.nav-logo .mark { width: 22px; height: 22px; border-radius: 5px; background: var(--ink); position: relative; overflow: hidden; }
.nav-logo .mark::after { content: ""; position: absolute; inset: 6px; border-radius: 50%; border: 1.5px solid var(--bg); }
.nav-logo .name { font-family: var(--f-display); font-weight: 500; font-style: italic; font-size: 14.5px; letter-spacing: 0.02em; }
.nav-link { padding: 8px 14px; border-radius: 999px; font-size: 13px; color: var(--ink); transition: background 0.2s, color 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.nav-link:hover { background: rgba(0,0,0,0.05); }
[data-theme="dark"] .nav-link:hover { background: rgba(255,255,255,0.08); }
.nav-link.active { background: var(--ink); color: var(--bg); }
.nav-link .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.theme-toggle { margin-left: 4px; width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--border); display: grid; place-items: center; transition: background 0.2s; }
.theme-toggle:hover { background: rgba(0,0,0,0.04); }
[data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,0.06); }
.theme-toggle svg { width: 15px; height: 15px; }

/* ============ SECTION HEADER (Swiss rule) ============ */
.sec { border-top: 1px solid var(--border-strong); padding-top: 28px; }
.sec-head { display: grid; grid-template-columns: auto 1fr auto; align-items: baseline; gap: 24px; }
.sec-head .tag { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.sec-head .tag.r { text-align: right; }
.sec-head h2 { font-family: var(--f-display); font-weight: 500; font-size: 36px; letter-spacing: -0.022em; margin: 0; line-height: 1.1; }

/* ============ HOME HERO (minimal — one thing, lots of air) ============ */
.hero {
  position: relative;
  min-height: 92vh;
  padding: 180px 0 80px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.hero-inner { width: 100%; display: flex; flex-direction: column; gap: 72px; }
.hero-eyebrow { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
.hero-eyebrow .dot-live { display: inline-flex; align-items: center; gap: 8px; }
.hero-eyebrow .dot-live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent); }
.hero-title { font-family: var(--f-display); font-weight: 400; font-size: clamp(64px, 10.5vw, 156px); line-height: 0.96; letter-spacing: -0.048em; margin: 0; max-width: 14ch; }
.hero-title .em { font-style: italic; font-weight: 300; color: var(--muted); }
.hero-title .accent { color: var(--accent); }
.hero-foot-min { display: flex; justify-content: space-between; align-items: baseline; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.hero-foot-min .read-next { color: var(--ink); display: inline-flex; gap: 10px; align-items: center; text-transform: none; letter-spacing: 0; font-size: 14px; font-family: var(--f-body); }
.hero-foot-min .read-next .title { font-style: italic; }
.hero-foot-min .read-next:hover .arr { transform: translateX(4px); }
.hero-foot-min .arr { transition: transform 0.25s var(--ease); }

/* Scroll cue */
.scroll-cue { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.scroll-cue .line { width: 1px; height: 36px; background: var(--ink); opacity: 0.35; animation: scrollpulse 2.4s ease-in-out infinite; transform-origin: top; }
@keyframes scrollpulse { 0%,100% { transform: scaleY(0.3); opacity: 0.3; } 50% { transform: scaleY(1); opacity: 0.8; } }

/* ============ ARTICLE LIST ============ */
.wrap { max-width: 1360px; margin: 0 auto; padding: 0 48px; }
.trending { padding: 96px 0 40px; }
.trending-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 28px; margin-top: 48px; }
.t-card { position: relative; padding: 22px 0; border-top: 1px solid var(--border); transition: padding 0.4s var(--ease); }
.t-card:last-child { border-bottom: 1px solid var(--border); }
.t-card:hover { padding-left: 20px; }
.t-card .row { display: grid; grid-template-columns: 60px 1fr 160px 120px 100px; gap: 24px; align-items: center; }
.t-card .no { font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.1em; color: var(--muted); }
.t-card .ttl { font-family: var(--f-display); font-weight: 500; font-size: 22px; letter-spacing: -0.01em; line-height: 1.3; display: flex; align-items: center; gap: 12px; }
.t-card .ttl .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
.t-card .cat { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.t-card .date { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-align: right; }
.t-card .arrow { text-align: right; font-family: var(--f-mono); font-size: 14px; color: var(--muted); transition: transform 0.3s var(--ease), color 0.3s; }
.t-card:hover .arrow { color: var(--ink); transform: translateX(6px); }
.t-card .ttl:hover { color: var(--accent); }

/* ============ FEATURED (asymmetric) ============ */
.featured { padding: 56px 0 40px; display: grid; grid-template-columns: 5fr 7fr; gap: 56px; border-top: 1px solid var(--border-strong); margin-top: 56px; padding-top: 56px; }
.featured .hero-art {
  aspect-ratio: 4 / 5;
  background:
    repeating-linear-gradient(135deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 14px),
    linear-gradient(180deg, var(--bg-sub), var(--surface));
  border: 1px solid var(--border);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .featured .hero-art { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 14px),
    linear-gradient(180deg, var(--bg-sub), var(--surface)); }
.featured .hero-art .tag-art { position: absolute; top: 16px; left: 16px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.featured .hero-art .tag-art.r { left: auto; right: 16px; top: auto; bottom: 16px; }
.featured .hero-art .big-n { position: absolute; left: 24px; bottom: 20px; font-family: var(--f-display); font-size: 96px; font-weight: 500; letter-spacing: -0.045em; color: var(--ink); line-height: 0.9; }
.featured .col-r { display: flex; flex-direction: column; justify-content: space-between; padding: 8px 0; }
.featured h3 { font-family: var(--f-display); font-weight: 500; font-size: clamp(34px, 3.6vw, 52px); line-height: 1.05; letter-spacing: -0.028em; margin: 16px 0 20px; }
.featured h3 a { border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.featured h3 a:hover { border-bottom-color: var(--accent); color: var(--accent); }
.featured .lede { font-size: 16.5px; line-height: 1.75; color: var(--ink-2); max-width: 54ch; }
.featured .meta-line { display: flex; gap: 20px; align-items: center; margin-top: 28px; }
.featured .avatar { width: 38px; height: 38px; border-radius: 50%; background:
  radial-gradient(circle at 30% 30%, var(--ink-2), var(--ink)); }
.featured .who { font-size: 13.5px; line-height: 1.4; }
.featured .who b { font-weight: 500; }
.featured .who div { color: var(--muted); font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }

/* ============ LATEST (asymmetric grid) ============ */
.latest { padding: 96px 0 40px; }
.latest-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 28px; margin-top: 48px; }
.l-card { grid-column: span 4; display: flex; flex-direction: column; gap: 14px; padding: 8px 0; }
.l-card:nth-child(1) { grid-column: span 7; grid-row: span 2; }
.l-card:nth-child(2) { grid-column: span 5; }
.l-card:nth-child(3) { grid-column: span 5; }
.l-card:nth-child(4) { grid-column: span 4; }
.l-card:nth-child(5) { grid-column: span 4; }
.l-card:nth-child(6) { grid-column: span 4; }
.l-card .thumb {
  aspect-ratio: 16 / 10;
  background:
    repeating-linear-gradient(135deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 14px),
    var(--bg-sub);
  border: 1px solid var(--border);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  transition: transform 0.5s var(--ease);
}
[data-theme="dark"] .l-card .thumb { background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 14px),
    var(--bg-sub); }
.l-card:nth-child(1) .thumb { aspect-ratio: 16 / 11; }
.l-card:hover .thumb { transform: scale(1.01); }
.l-card .thumb::after {
  content: attr(data-tag); position: absolute; bottom: 14px; left: 14px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
}
.l-card .meta { display: flex; gap: 14px; align-items: center; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.l-card .meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.l-card h4 { font-family: var(--f-display); font-weight: 500; font-size: 26px; line-height: 1.2; letter-spacing: -0.015em; margin: 0; }
.l-card:nth-child(1) h4 { font-size: 40px; letter-spacing: -0.028em; line-height: 1.05; }
.l-card h4 a { border-bottom: 1px solid transparent; transition: border-color 0.25s, color 0.25s; }
.l-card h4 a:hover { border-bottom-color: var(--accent); color: var(--accent); }
.l-card p { font-size: 14.5px; line-height: 1.7; color: var(--ink-2); margin: 0; max-width: 52ch; }

/* ============ TAGS ============ */
.tags { padding: 96px 0 40px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 48px; }
.tag-pill { padding: 10px 16px; border-radius: 999px; border: 1px solid var(--border); font-family: var(--f-mono); font-size: 11.5px; letter-spacing: 0.1em; color: var(--ink-2); transition: all 0.25s; }
.tag-pill:hover { border-color: var(--ink); color: var(--ink); transform: translateY(-1px); }
.tag-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tag-pill .n { margin-left: 8px; color: var(--muted); }
.tag-pill.active .n { color: var(--muted-2); }

/* ============ AUTH (Login / Register) ============ */
.auth-page { min-height: 100vh; display: grid; grid-template-columns: 6fr 6fr; gap: 0; background: var(--bg); }
.auth-art { background: var(--bg-sub); border-right: 1px solid var(--border); position: relative; overflow: hidden; padding: 140px 56px 56px; display: flex; flex-direction: column; justify-content: space-between; }
.auth-art::before { content: ""; position: absolute; inset: 140px 56px 56px; background: repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 1px, transparent 1px 22px); pointer-events: none; }
[data-theme="dark"] .auth-art::before { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 22px); }
.auth-art .quote { font-family: var(--f-display); font-weight: 400; font-size: clamp(40px, 4vw, 64px); line-height: 1.05; letter-spacing: -0.028em; max-width: 12ch; position: relative; z-index: 1; }
.auth-art .quote .em { font-style: italic; }
.auth-art .quote .accent { color: var(--accent); }
.auth-art .art-meta { display: flex; justify-content: space-between; align-items: end; position: relative; z-index: 1; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.auth-art .art-meta .n { font-family: var(--f-display); font-size: 80px; font-weight: 500; letter-spacing: -0.04em; color: var(--ink); line-height: 0.9; text-transform: none; }
.auth-panel { padding: 140px 56px 56px; display: flex; flex-direction: column; }
.auth-panel .switcher { display: flex; gap: 4px; padding: 4px; border: 1px solid var(--border); border-radius: 999px; width: fit-content; margin-bottom: 40px; }
.auth-panel .switcher button { padding: 8px 18px; border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); transition: all 0.25s; }
.auth-panel .switcher button.active { background: var(--ink); color: var(--bg); }
.auth-panel h1 { font-family: var(--f-display); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.03em; margin: 0 0 18px; }
.auth-panel .lede { font-size: 15px; line-height: 1.7; color: var(--muted); max-width: 44ch; margin-bottom: 40px; }
.auth-form { display: grid; gap: 22px; max-width: 420px; }
.field { display: grid; gap: 8px; }
.field label { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
.field label .hint { text-transform: none; letter-spacing: 0; color: var(--muted-2); font-size: 10.5px; }
.field input { background: transparent; border: 0; border-bottom: 1px solid var(--border-strong); padding: 12px 0; font: inherit; font-size: 17px; color: var(--ink); transition: border-color 0.25s; font-family: var(--f-body); }
.field input:focus { outline: none; border-bottom-color: var(--accent); }
.field input::placeholder { color: var(--muted-2); }
.field .err { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #c25454; }
[data-theme="dark"] .field .err { color: #ef8b8b; }
.auth-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.btn-primary { padding: 14px 22px; border-radius: 999px; background: var(--ink); color: var(--bg); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 10px; transition: transform 0.2s, background 0.2s; }
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary .arrow { transition: transform 0.25s var(--ease); }
.btn-primary:hover .arrow { transform: translateX(4px); }
.link-forgot { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 0.25s, border-color 0.25s; }
.link-forgot:hover { color: var(--accent); border-bottom-color: var(--accent); }

.auth-divider { display: flex; align-items: center; gap: 14px; margin: 32px 0; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

.oauth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.oauth-btn { padding: 14px 16px; border-radius: 999px; border: 1px solid var(--border-strong); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.25s, border-color 0.25s; }
.oauth-btn:hover { border-color: var(--ink); background: rgba(0,0,0,0.03); }
[data-theme="dark"] .oauth-btn:hover { background: rgba(255,255,255,0.04); }

/* ============ FOOTER ============ */
.footer { margin-top: 120px; padding: 40px 0 36px; border-top: 1px solid var(--border-strong); }
.footer .row { display: flex; justify-content: space-between; align-items: center; gap: 24px; }
.footer .copy { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.footer .back-top { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: inline-flex; gap: 8px; align-items: center; transition: color 0.25s; }
.footer .back-top:hover { color: var(--ink); }

/* ============ VIEW SWITCHER ============ */
.view-switch { position: fixed; left: 24px; bottom: 24px; z-index: 90; display: flex; gap: 4px; padding: 6px; background: var(--glass); backdrop-filter: blur(22px); border: 1px solid var(--glass-border); border-radius: 999px; box-shadow: var(--shadow-md); }
.view-switch button { padding: 8px 14px; border-radius: 999px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); transition: all 0.25s; }
.view-switch button.active { background: var(--ink); color: var(--bg); }
.view-switch .kbd { padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); margin-left: 8px; font-size: 9.5px; }

/* ============ TWEAKS PANEL ============ */
.tw-panel { position: fixed; right: 24px; bottom: 24px; width: 320px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 16px; padding: 18px; box-shadow: var(--shadow-md); z-index: 95; transition: transform 0.3s var(--ease), opacity 0.3s; }
.tw-panel.hidden { transform: translateY(20px); opacity: 0; pointer-events: none; }
.tw-panel h4 { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; display: flex; justify-content: space-between; align-items: center; }
.tw-group { margin-bottom: 14px; }
.tw-group .label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 6px; }
.tw-btns { display: flex; gap: 4px; padding: 4px; background: var(--bg-sub); border-radius: 10px; }
.tw-btns button { flex: 1; padding: 6px 8px; border-radius: 7px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); transition: all 0.2s; }
.tw-btns button.active { background: var(--ink); color: var(--bg); }
.tw-colors { display: flex; gap: 6px; }
.tw-colors button { width: 28px; height: 28px; border-radius: 999px; border: 2px solid transparent; transition: border-color 0.2s; }
.tw-colors button.active { border-color: var(--ink); }

/* ============ 404 / ERROR PAGE (Option A — Monumental) ============ */
.err-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.err-inner { text-align: center; max-width: 440px; padding: 40px 24px; position: relative; overflow: hidden; }
.err-bg-num { font-family: var(--f-display); font-size: 260px; font-weight: 700; letter-spacing: -.08em; line-height: 1; color: var(--ink); opacity: .04; pointer-events: none; user-select: none; margin: -40px 0 -60px; }
.err-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 16px; position: relative; }
.err-title { font-family: var(--f-display); font-size: 44px; font-weight: 500; letter-spacing: -.02em; line-height: 1.1; color: var(--ink); margin: 0 0 12px; position: relative; }
.err-sub { font-size: 14px; line-height: 1.7; color: var(--muted); max-width: 30ch; margin: 0 auto 0; position: relative; }
.err-rule { width: 40px; height: 1px; background: var(--ink); opacity: .18; margin: 28px auto; }
.err-cta { display: inline-flex; align-items: center; gap: 10px; padding: 11px 22px; background: var(--ink); color: var(--bg); border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; transition: transform .2s; position: relative; }
.err-cta:hover { transform: translateX(3px); }

/* ============ EMPTY STATE ============ */
.es-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 64px 24px; text-align: center; }
.es-icon { font-family: var(--f-display); font-size: 64px; font-weight: 300; color: var(--muted-2); letter-spacing: -0.02em; line-height: 1; opacity: 0.4; }
.es-title { font-family: var(--f-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; color: var(--ink); margin: 0; }
.es-sub { font-size: 13.5px; line-height: 1.7; color: var(--muted); margin: 0; max-width: 40ch; }
.es-cta { margin-top: 6px; padding: 10px 20px; background: var(--ink); color: var(--bg); border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; transition: transform 0.15s; }
.es-cta:hover { transform: translateY(-1px); }

/* ============ SKELETON ============ */
@keyframes sk-shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.sk-pulse { background: linear-gradient(90deg, var(--bg-sub) 25%, color-mix(in oklch, var(--bg-sub) 60%, var(--surface)) 50%, var(--bg-sub) 75%); background-size: 800px 100%; animation: sk-shimmer 1.6s ease-in-out infinite; border-radius: 4px; }
.sk-card { display: flex; flex-direction: column; gap: 12px; }
.sk-thumb { aspect-ratio: 16/9; border-radius: 6px; }
.sk-body { display: flex; flex-direction: column; gap: 6px; padding: 4px 0; }
.sk-line { border-radius: 4px; }
.sk-row { display: grid; grid-template-columns: 88px 1fr; gap: 20px; padding: 22px 0; border-bottom: 1px solid var(--divider); align-items: start; }
.sk-row-thumb { aspect-ratio: 4/3; border-radius: 4px; }
.sk-row-body { display: flex; flex-direction: column; gap: 8px; }


/* ============ DARK MODE REFINEMENTS ============ */
/* Glass / navbar */
[data-theme="dark"] .nav-inner { background: rgba(18,18,20,0.75); }
[data-theme="dark"] .nav-link:hover { background: rgba(255,255,255,0.07); }

/* Cards & surfaces */
[data-theme="dark"] .art-card-g { background: var(--surface); }
[data-theme="dark"] .ma-card { background: var(--surface); }
[data-theme="dark"] .ap-pin-card { background: var(--surface); }
[data-theme="dark"] .sv-card { background: var(--surface); }
[data-theme="dark"] .pair { background: var(--surface); }
[data-theme="dark"] .tw-panel { background: var(--surface); border-color: rgba(255,255,255,0.14); }

/* Input / form fields in dark */
[data-theme="dark"] .field input { color: var(--ink); }
[data-theme="dark"] .ed-cm { background: var(--bg-sub); }
[data-theme="dark"] .ed-meta { background: var(--bg); }
[data-theme="dark"] .ed-topbar { background: var(--bg); border-bottom-color: rgba(255,255,255,0.08); }
[data-theme="dark"] .ed-pane-head { background: var(--bg-sub); border-bottom-color: rgba(255,255,255,0.08); }
[data-theme="dark"] .ed-cm-footer { background: var(--bg-sub); border-top-color: rgba(255,255,255,0.07); }
[data-theme="dark"] .st-input, [data-theme="dark"] .st-textarea, [data-theme="dark"] .cm-textarea { background: var(--surface); color: var(--ink); border-color: rgba(255,255,255,0.12); }
[data-theme="dark"] .st-input:focus, [data-theme="dark"] .st-textarea:focus, [data-theme="dark"] .cm-textarea:focus { border-color: var(--accent); }
[data-theme="dark"] .st-prefix { background: var(--bg-sub); }
[data-theme="dark"] .st-seg, [data-theme="dark"] .art-seg { background: var(--bg-sub); }
[data-theme="dark"] .st-nav-item:hover { background: rgba(255,255,255,0.06); }

/* Comments */
[data-theme="dark"] .cm-preview-box { background: var(--surface); }
[data-theme="dark"] .cm-compose { border-color: rgba(255,255,255,0.08); }

/* Auth page left panel */
[data-theme="dark"] .auth-art { background: var(--bg-sub); }

/* Shell / rail */
[data-theme="dark"] .shell-rail { background: var(--bg-sub); border-right-color: rgba(255,255,255,0.08); }
[data-theme="dark"] .rail-item.active { background: var(--ink); color: var(--bg); }

/* Settings */
[data-theme="dark"] .st-page { background: var(--bg); }
[data-theme="dark"] .st-rail { background: var(--bg-sub); border-right-color: rgba(255,255,255,0.08); }
[data-theme="dark"] .st-toggle-track { background: rgba(255,255,255,0.15); }
[data-theme="dark"] .st-danger-card { border-color: rgba(255,255,255,0.1); }

/* Tags & pills */
[data-theme="dark"] .tag-pill:hover { background: rgba(255,255,255,0.06); }
[data-theme="dark"] .art-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
[data-theme="dark"] .sv-tag-pill:hover { background: var(--ink); color: var(--bg); }

/* Error page */
[data-theme="dark"] .err-bg-num { opacity: .06; }

/* ============ MOBILE RESPONSIVE ============ */
@media (max-width: 768px) {
  /* Wrap */
  .wrap { padding: 0 20px; }

  /* Hero */
  .hero { min-height: 80vh; padding: 120px 0 60px; }
  .hero-title { font-size: clamp(52px, 14vw, 96px); }
  .hero-eyebrow { flex-direction: column; gap: 4px; }

  /* Navbar — keep pill but smaller */
  .nav-inner { padding: 6px 6px 6px 14px; gap: 2px; }
  .nav-link { padding: 6px 10px; font-size: 12px; }
  .nav-logo .name { display: none; }

  /* Trending list row */
  .t-card .row { grid-template-columns: 40px 1fr 80px; gap: 12px; }
  .t-card .cat, .t-card .date, .t-card .arrow { display: none; }
  .t-card .row > :nth-child(3) { display: block; }

  /* Latest grid — single col */
  .latest-grid { grid-template-columns: 1fr; }
  .l-card { grid-column: span 1 !important; grid-row: span 1 !important; }

  /* Featured — stack */
  .featured { grid-template-columns: 1fr; gap: 28px; }

  /* Auth — stack */
  .auth-page { grid-template-columns: 1fr; }
  .auth-art { display: none; }
  .auth-panel { padding: 80px 24px 48px; }

  /* Articles page */
  .art-page-body { grid-template-columns: 1fr; }
  .art-rail { position: static; max-height: none; }
  .art-toolbar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .art-tb-right { flex-wrap: wrap; }

  /* Shell / workspace */
  .shell { grid-template-columns: 1fr; }
  .shell-rail { position: fixed; bottom: 0; left: 0; right: 0; height: auto; flex-direction: row; width: 100%; border-right: none; border-top: 1px solid var(--border); padding: 8px 12px; overflow-x: auto; z-index: 80; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .shell-rail .brand, .shell-rail .rail-section, .shell-rail .rail-foot { display: none; }
  .rail-item { flex-direction: column; gap: 2px; font-size: 10px; padding: 6px 10px; border-radius: 8px; }
  .shell-main { padding: 24px 20px 120px; }

  /* Editor */
  .ed-body, .ed-body.mode-split { grid-template-columns: 1fr; }
  .ed-topbar { grid-template-columns: auto 1fr; gap: 10px; padding: 10px 16px; flex-wrap: wrap; }
  .ed-actions { flex-wrap: wrap; gap: 6px; }
  .ed-mode { display: none; }

  /* Settings */
  .st-page { grid-template-columns: 1fr; padding-top: 80px; }
  .st-rail { position: static; height: auto; flex-direction: row; overflow-x: auto; padding: 10px 12px; border-right: none; border-bottom: 1px solid var(--border); gap: 4px; flex-wrap: wrap; }
  .st-nav-head { display: none; }
  .st-nav { flex-direction: row; flex-wrap: wrap; gap: 4px; }
  .st-main { padding: 24px 16px 80px; }
  .st-field-group { grid-template-columns: 1fr; gap: 6px; }

  /* Tag Detail */
  .td-row { grid-template-columns: 120px 1fr; }
  .td-row-arr { display: none; }
  .td-title { font-size: clamp(44px, 10vw, 80px); }

  /* Author Profile */
  .ap-header { grid-template-columns: 1fr; gap: 20px; }
  .ap-pinned-grid { grid-template-columns: 1fr; }

  /* Search */
  .sv-page { padding: 80px 16px 120px; }
  .sv-search input { font-size: 26px; }
  .sv-cards { grid-template-columns: 1fr; }
  .sv-authors { grid-template-columns: 1fr; }

  /* View switcher */
  .view-switch { bottom: 72px; flex-wrap: wrap; max-width: calc(100vw - 48px); }

  /* Comments */
  .cm-compose-top { gap: 10px; }

  /* My Articles */
  .ma-title { font-size: 36px; }
  .ma-row { grid-template-columns: 64px 1fr; }
  .ma-row > :nth-child(n+4):not(.ma-reject) { display: none; }
  .ma-grid { grid-template-columns: 1fr; }

  /* Error page */
  .err-bg-num { font-size: 180px; }
  .err-title { font-size: 32px; }
}

/* ============ APP SHELL (for editor / my-articles) ============ */
.shell { min-height: 100vh; display: grid; grid-template-columns: 220px 1fr; }
.shell-rail { position: sticky; top: 0; height: 100vh; border-right: 1px solid var(--border); padding: 22px 14px 18px; display: flex; flex-direction: column; gap: 6px; background: var(--bg); }
.shell-rail .brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 18px; border-bottom: 1px solid var(--divider); margin-bottom: 10px; }
.shell-rail .brand .mark { width: 20px; height: 20px; border-radius: 5px; background: var(--ink); position: relative; }
.shell-rail .brand .mark::after { content: ""; position: absolute; inset: 5px; border: 1.4px solid var(--bg); border-radius: 50%; }
.shell-rail .brand .name { font-family: var(--f-display); font-style: italic; font-weight: 500; font-size: 14px; letter-spacing: 0.02em; }
.rail-section { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); padding: 14px 10px 6px; }
.rail-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13.5px; color: var(--ink-2); transition: background 0.18s, color 0.18s; cursor: none; }
.rail-item:hover { background: var(--bg-sub); color: var(--ink); }
.rail-item.active { background: var(--ink); color: var(--bg); }
.rail-item .n { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--muted); }
.rail-item.active .n { color: color-mix(in oklab, var(--bg) 70%, transparent); }
.rail-foot { margin-top: auto; padding: 12px 10px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); }
.shell-main { padding: 32px 48px 80px; min-width: 0; }
.shell-back { position: sticky; top: 0; z-index: 10; margin: -32px -48px 24px; padding: 14px 48px; background: color-mix(in oklab, var(--bg) 92%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--divider); display: flex; align-items: center; gap: 16px; }

/* ============ MY ARTICLES ============ */
.ma-head { display: flex; flex-direction: column; gap: 28px; margin-bottom: 28px; }
.ma-title-row { display: flex; align-items: end; justify-content: space-between; gap: 24px; }
.ma-title { font-family: var(--f-display); font-size: 56px; letter-spacing: -0.028em; font-weight: 500; line-height: 0.96; margin: 0; }
.ma-title .em { font-style: italic; font-weight: 300; color: var(--muted); }
.ma-sub { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.ma-stats { display: flex; gap: 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.ma-stat { flex: 1; padding: 18px 20px; border-right: 1px solid var(--divider); }
.ma-stat:last-child { border-right: none; }
.ma-stat .k { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.ma-stat .v { font-family: var(--f-display); font-weight: 500; font-size: 32px; letter-spacing: -0.02em; line-height: 1; margin-top: 10px; }
.ma-stat .v .unit { font-size: 13px; color: var(--muted); margin-left: 4px; letter-spacing: 0; }
.ma-toolbar { display: flex; align-items: center; gap: 8px; padding: 16px 0 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.ma-chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); font-size: 12.5px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 8px; transition: all 0.18s; }
.ma-chip:hover { border-color: var(--border-strong); }
.ma-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.ma-chip .n { font-family: var(--f-mono); font-size: 10px; opacity: 0.7; }
.ma-search { margin-left: auto; display: flex; align-items: center; gap: 8px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 999px; min-width: 220px; }
.ma-search input { border: none; outline: none; background: transparent; color: var(--ink); font: inherit; font-size: 13px; width: 100%; cursor: none; }
.ma-view-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 2px; }
.ma-view-toggle button { padding: 5px 11px; border-radius: 999px; font-size: 11px; font-family: var(--f-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.ma-view-toggle button.active { background: var(--ink); color: var(--bg); }
.ma-new { padding: 8px 16px; border-radius: 999px; background: var(--ink); color: var(--bg); font-size: 13px; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s, background 0.2s; }
.ma-new:hover { transform: translateX(2px); }
.ma-new .plus { width: 14px; height: 14px; display: grid; place-items: center; }

/* List view */
.ma-list { display: flex; flex-direction: column; }
.ma-row { display: grid; grid-template-columns: 88px 1fr 120px 110px 130px 110px; gap: 24px; padding: 22px 0; border-bottom: 1px solid var(--divider); align-items: center; transition: background 0.2s; position: relative; }
.ma-row:hover { background: color-mix(in oklab, var(--ink) 3%, transparent); }
.ma-row:hover .ma-row-arrow { opacity: 1; transform: translateX(0); }
.ma-thumb { width: 88px; height: 64px; border-radius: 8px; background:
  repeating-linear-gradient(135deg, rgba(10,10,11,0.07) 0 2px, transparent 2px 12px),
  linear-gradient(180deg, var(--bg-sub), var(--surface));
  position: relative; overflow: hidden; border: 1px solid var(--divider);
  display: grid; place-items: center;
}
[data-theme="dark"] .ma-thumb { background:
  repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 12px),
  linear-gradient(180deg, var(--bg-sub), var(--surface));
}
.ma-thumb .t { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.16em; color: var(--muted-2); }
.ma-row-title { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.ma-row-title .t { font-family: var(--f-display); font-weight: 500; font-size: 17px; letter-spacing: -0.008em; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ma-row-title .s { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.ma-row-title .tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.ma-row-title .tags span { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 2px 8px; border: 1px solid var(--divider); border-radius: 999px; }
.ma-status { display: inline-flex; align-items: center; gap: 8px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
.ma-status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
.ma-status.DRAFT { color: var(--muted); } .ma-status.DRAFT::before { background: var(--muted); }
.ma-status.PENDING_REVIEW { color: #B38600; } .ma-status.PENDING_REVIEW::before { background: #E0A820; }
.ma-status.PUBLISHED { color: #2E7D4E; } .ma-status.PUBLISHED::before { background: #47B881; }
.ma-status.REJECTED { color: #C3412C; } .ma-status.REJECTED::before { background: #E45C44; }
.ma-status.ARCHIVED { color: var(--muted-2); } .ma-status.ARCHIVED::before { background: var(--muted-2); }
[data-theme="dark"] .ma-status.PENDING_REVIEW { color: #E0B84A; }
[data-theme="dark"] .ma-status.PUBLISHED { color: #65D19A; }
[data-theme="dark"] .ma-status.REJECTED { color: #FF8066; }
.ma-metrics { display: flex; gap: 14px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); }
.ma-metrics b { font-weight: 500; color: var(--ink-2); }
.ma-updated { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); }
.ma-actions { display: flex; gap: 6px; justify-content: flex-end; }
.ma-action { padding: 6px 10px; border-radius: 6px; font-size: 12px; color: var(--muted); transition: all 0.18s; font-family: var(--f-mono); letter-spacing: 0.1em; text-transform: uppercase; }
.ma-action:hover { color: var(--ink); background: var(--bg-sub); }
.ma-action.primary { color: var(--ink); }
.ma-reject { grid-column: 1 / -1; margin-top: 8px; padding: 10px 14px; background: color-mix(in oklab, #E45C44 12%, var(--bg)); border-left: 2px solid #E45C44; border-radius: 0 6px 6px 0; font-size: 12.5px; color: var(--ink-2); line-height: 1.6; }
[data-theme="dark"] .ma-reject { background: color-mix(in oklab, #FF8066 15%, var(--bg)); }
.ma-reject b { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #C3412C; display: block; margin-bottom: 4px; }
[data-theme="dark"] .ma-reject b { color: #FF8066; }

/* Grid view */
.ma-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding-top: 24px; }
.ma-card { border: 1px solid var(--divider); border-radius: 12px; overflow: hidden; transition: all 0.25s var(--ease); background: var(--surface); display: flex; flex-direction: column; }
.ma-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
.ma-card .thumb { aspect-ratio: 16 / 10; background:
  repeating-linear-gradient(135deg, rgba(10,10,11,0.07) 0 2px, transparent 2px 14px),
  linear-gradient(180deg, var(--bg-sub), var(--surface));
  position: relative;
}
[data-theme="dark"] .ma-card .thumb { background:
  repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 14px),
  linear-gradient(180deg, var(--bg-sub), var(--surface));
}
.ma-card .thumb .t { position: absolute; top: 14px; left: 14px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; color: var(--muted); }
.ma-card .thumb .s { position: absolute; top: 12px; right: 12px; }
.ma-card .body { padding: 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.ma-card h4 { font-family: var(--f-display); font-weight: 500; font-size: 18px; letter-spacing: -0.008em; line-height: 1.3; margin: 0; }
.ma-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ma-card .foot { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-top: 1px solid var(--divider); font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

/* ============ EDITOR ============ */
.ed-shell { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
.ed-topbar { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 18px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
.ed-back { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); transition: all 0.18s; }
.ed-back:hover { background: var(--bg-sub); color: var(--ink); }
.ed-title-input { font-family: var(--f-display); font-weight: 500; font-size: 18px; letter-spacing: -0.005em; border: none; outline: none; background: transparent; color: var(--ink); width: 100%; cursor: none; }
.ed-title-input::placeholder { color: var(--muted-2); font-style: italic; font-weight: 300; }
.ed-status { display: inline-flex; align-items: center; gap: 8px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.ed-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #47B881; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.ed-actions { display: flex; gap: 8px; align-items: center; }
.ed-btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; transition: all 0.18s; border: 1px solid var(--border); }
.ed-btn:hover { border-color: var(--border-strong); background: var(--bg-sub); }
.ed-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.ed-btn.primary:hover { background: var(--ink-2); }
.ed-body { flex: 1; display: grid; grid-template-columns: 1fr 1fr 300px; min-height: 0; }
.ed-body.no-meta { grid-template-columns: 1fr 1fr; }
.ed-body.mode-write { grid-template-columns: 1fr 300px; }
.ed-body.mode-write.no-meta { grid-template-columns: 1fr; }
.ed-body.mode-preview { grid-template-columns: 1fr 300px; }
.ed-body.mode-preview.no-meta { grid-template-columns: 1fr; }

/* Mode segmented control */
.ed-mode { display: inline-flex; gap: 2px; padding: 3px; border-radius: 10px; background: var(--bg-sub); border: 1px solid var(--border); }
.ed-mode button { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 7px; font-size: 12px; color: var(--muted); font-family: var(--f-body); transition: all 0.18s; }
.ed-mode button:hover { color: var(--ink); }
.ed-mode button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.04); }
[data-theme="dark"] .ed-mode button.active { background: var(--ink); color: var(--bg); box-shadow: none; }
.ed-mode svg { flex-shrink: 0; }

/* In write / preview mode, let the single pane breathe */
.ed-body.mode-write .ed-preview, .ed-body.mode-preview .ed-preview { padding: 56px 48px 80px; }
.ed-body.mode-write .ed-cm, .ed-body.mode-preview .ed-cm { padding: 36px 0 40px; }
.ed-body.mode-write .ed-cm-inner, .ed-body.mode-preview .ed-cm-inner { max-width: 880px; margin: 0 auto; grid-template-columns: 56px 1fr; }
.ed-body.mode-preview .ed-preview .prose { max-width: 68ch; }
.ed-pane { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; min-width: 0; }
.ed-pane:last-child { border-right: none; }
.ed-pane-head { padding: 10px 20px; border-bottom: 1px solid var(--divider); font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
.ed-pane-head .r { display: flex; align-items: center; gap: 14px; }
.ed-pane-head .r > span { display: inline-flex; align-items: center; height: 22px; }
.ed-cm { flex: 1; overflow: auto; font-family: var(--f-mono); font-size: 14px; line-height: 1.75; padding: 22px 0; background: var(--surface); }
.ed-cm-inner { display: grid; grid-template-columns: 48px 1fr; }
.ed-cm-gutter { text-align: right; color: var(--muted-2); user-select: none; font-size: 12px; padding-top: 1px; }
.ed-cm-gutter div { line-height: 1.75; padding-right: 10px; }
.ed-cm textarea { flex: 1; border: none; outline: none; background: transparent; color: var(--ink); font-family: var(--f-mono); font-size: 14px; line-height: 1.75; resize: none; width: 100%; padding: 0 24px 40px 8px; min-height: 100%; cursor: none; }
.ed-cm-footer { border-top: 1px solid var(--divider); padding: 8px 20px; display: flex; justify-content: space-between; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); background: var(--bg); }
.ed-preview { flex: 1; overflow: auto; padding: 40px 44px 64px; }
.ed-preview .prose { max-width: 64ch; margin: 0 auto; }

/* Prose (used by preview + article detail) */
.prose h1 { font-family: var(--f-display); font-weight: 500; font-size: clamp(38px, 4.4vw, 56px); letter-spacing: -0.032em; line-height: 1.05; margin: 0 0 16px; }
.prose .lede { font-family: var(--f-display); font-weight: 300; font-style: italic; font-size: 22px; color: var(--muted); line-height: 1.5; margin: 0 0 48px; letter-spacing: -0.005em; }
.prose h2 { font-family: var(--f-display); font-weight: 500; font-size: 26px; letter-spacing: -0.015em; margin: 56px 0 18px; scroll-margin-top: 80px; }
.prose p { font-size: 16px; line-height: 1.8; margin: 0 0 20px; color: var(--ink-2); text-wrap: pretty; }
.prose ul { padding-left: 22px; margin: 0 0 20px; }
.prose li { font-size: 16px; line-height: 1.8; color: var(--ink-2); margin-bottom: 6px; }
.prose blockquote { border-left: 2px solid var(--ink); padding: 4px 0 4px 20px; margin: 24px 0; font-style: italic; color: var(--ink); font-size: 18px; line-height: 1.6; font-family: var(--f-display); font-weight: 300; }
.prose code { font-family: var(--f-mono); font-size: 0.88em; background: var(--bg-sub); padding: 1px 6px; border-radius: 4px; color: var(--ink); border: 1px solid var(--divider); }
.prose pre { background: var(--bg-sub); border: 1px solid var(--divider); border-radius: 8px; padding: 18px 22px; overflow: auto; margin: 24px 0; font-family: var(--f-mono); font-size: 13px; line-height: 1.7; }
.prose pre code { background: none; border: none; padding: 0; font-size: 13px; color: var(--ink-2); }
.prose hr { border: none; border-top: 1px solid var(--border); margin: 48px 0; }
.prose strong { color: var(--ink); font-weight: 600; }

/* Meta sidebar */
.ed-meta { padding: 24px 22px; overflow: auto; background: var(--bg); display: flex; flex-direction: column; gap: 24px; }
.ed-meta h5 { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
.ed-meta .cover-upload { aspect-ratio: 16 / 9; border: 1px dashed var(--border-strong); border-radius: 10px; display: grid; place-items: center; font-size: 12px; color: var(--muted); transition: all 0.2s; cursor: none; text-align: center; padding: 12px; line-height: 1.6; }
.ed-meta .cover-upload:hover { background: var(--bg-sub); border-color: var(--ink); color: var(--ink); }
.ed-meta textarea, .ed-meta input[type="text"] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit; font-size: 13.5px; color: var(--ink); resize: vertical; outline: none; transition: border 0.2s; cursor: none; font-family: var(--f-body); }
.ed-meta textarea:focus, .ed-meta input[type="text"]:focus { border-color: var(--ink); }
.ed-cats { display: flex; flex-wrap: wrap; gap: 6px; }
.ed-cat { padding: 6px 11px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; transition: all 0.18s; }
.ed-cat.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.ed-tags-wrap { display: flex; flex-direction: column; gap: 8px; }
.ed-tag-picked { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; }
.ed-tag-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 6px 4px 10px; background: var(--ink); color: var(--bg); border-radius: 999px; font-size: 11.5px; font-family: var(--f-mono); letter-spacing: 0.04em; }
.ed-tag-chip button { color: color-mix(in oklab, var(--bg) 60%, transparent); font-size: 14px; padding: 0 4px; line-height: 1; }
.ed-tag-search { position: relative; }
.ed-tag-search input { width: 100%; }
.ed-tag-pool { border: 1px solid var(--border); border-radius: 8px; padding: 6px; display: flex; flex-direction: column; gap: 1px; max-height: 180px; overflow: auto; background: var(--surface); }
.ed-tag-opt { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: 6px; font-size: 12.5px; color: var(--ink-2); transition: background 0.15s; }
.ed-tag-opt:hover { background: var(--bg-sub); color: var(--ink); }
.ed-tag-opt .n { font-family: var(--f-mono); font-size: 10px; color: var(--muted); }
.ed-tag-opt.create { color: var(--accent); font-style: italic; }

/* ============ ARTICLE DETAIL ============ */
.art-progress { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 200; background: transparent; }
.art-progress .bar { height: 100%; background: var(--accent); transition: width 0.08s linear; width: 0; }
.art-nav { position: fixed; right: 28px; top: 50%; transform: translateY(-50%); z-index: 80; display: flex; flex-direction: column; gap: 10px; padding: 12px 10px; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 999px; }
.art-nav-dot { width: 20px; height: 12px; display: grid; place-items: center; position: relative; }
.art-nav-dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; border: 1px solid var(--muted); background: transparent; transition: all 0.2s; }
.art-nav-dot:hover::before, .art-nav-dot.active::before { background: var(--ink); border-color: var(--ink); transform: scale(1.2); }
.art-nav-dot .label { position: absolute; right: 100%; margin-right: 14px; padding: 4px 10px; border-radius: 6px; background: var(--ink); color: var(--bg); font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; opacity: 0; transform: translateX(6px); transition: all 0.2s; pointer-events: none; }
.art-nav-dot:hover .label { opacity: 1; transform: translateX(0); }

.art-hero { padding: 160px 0 64px; border-bottom: 1px solid var(--border); }
.art-hero-meta { display: flex; gap: 14px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
.art-hero h1 { font-family: var(--f-display); font-weight: 500; font-size: clamp(52px, 7vw, 96px); letter-spacing: -0.04em; line-height: 1.02; margin: 0 0 28px; max-width: 18ch; }
.art-hero .lede { font-family: var(--f-display); font-weight: 300; font-style: italic; font-size: 22px; color: var(--muted); line-height: 1.55; max-width: 50ch; margin: 0; }
.art-hero-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--divider); }
.art-hero-foot .who { display: flex; align-items: center; gap: 12px; }
.art-hero-foot .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--ink); }
.art-hero-foot .who b { font-family: var(--f-display); font-weight: 500; font-size: 14px; display: block; }
.art-hero-foot .who span { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.art-cover { aspect-ratio: 16 / 9; margin: 0 0 56px; background:
  repeating-linear-gradient(135deg, rgba(10,10,11,0.06) 0 2px, transparent 2px 16px),
  linear-gradient(180deg, var(--bg-sub), var(--surface));
  border: 1px solid var(--divider); border-radius: 0;
  position: relative; overflow: hidden;
}
[data-theme="dark"] .art-cover { background:
  repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 16px),
  linear-gradient(180deg, var(--bg-sub), var(--surface)); }
.art-cover .cover-tag { position: absolute; top: 20px; left: 20px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.art-cover .cover-num { position: absolute; left: 24px; bottom: 20px; font-family: var(--f-display); font-size: 84px; font-weight: 500; letter-spacing: -0.04em; line-height: 0.9; }
.art-body { display: grid; grid-template-columns: 1fr; max-width: 64ch; margin: 0 auto; padding-bottom: 96px; }

.art-end { border-top: 1px solid var(--border); padding: 40px 0 64px; display: flex; justify-content: space-between; align-items: center; max-width: 64ch; margin: 0 auto; }
.art-end .reactions { display: flex; gap: 14px; }
.art-end .react { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 999px; font-size: 13px; transition: all 0.2s; }
.art-end .react:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.art-end .react .n { font-family: var(--f-mono); font-size: 11px; color: var(--muted); }
.art-end .react:hover .n { color: color-mix(in oklab, var(--bg) 70%, transparent); }

.preview-bar { position: sticky; top: 0; z-index: 50; background: color-mix(in oklab, var(--accent) 18%, var(--bg)); border-bottom: 1px solid var(--accent); padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink); }

@media (max-width: 1100px) {
  .ed-body { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
  .ed-body.no-meta { grid-template-columns: 1fr; }
  .ed-pane { border-right: none; border-bottom: 1px solid var(--border); }
  .shell { grid-template-columns: 64px 1fr; }
  .shell-rail .rail-label { display: none; }
  .ma-row { grid-template-columns: 64px 1fr auto; }
  .ma-row > :nth-child(n+4):not(.ma-reject) { display: none; }
  .ma-grid { grid-template-columns: 1fr; }
  .art-nav { display: none; }
}

/* ============ EDITOR IMAGES ============ */
.ed-cm { position: relative; }
.ed-cm.dropping { background: color-mix(in oklch, var(--accent) 8%, var(--surface)); }
.ed-drop-overlay { position: absolute; inset: 16px; border: 1.5px dashed var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2; background: color-mix(in oklch, var(--accent) 6%, transparent); backdrop-filter: blur(2px); }
.ed-drop-overlay span { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); padding: 10px 18px; background: var(--surface); border-radius: 999px; border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); }

/* pane head image button */
.ed-ph-btn { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-family: var(--f-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--divider); transition: all 0.18s; }
.ed-ph-btn:hover { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); background: color-mix(in oklch, var(--accent) 6%, transparent); }

/* Meta: images section */
.ed-meta h5 { display: flex; align-items: baseline; justify-content: space-between; }
.ed-img-add { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.ed-img-add:hover { background: color-mix(in oklch, var(--accent) 10%, transparent); }
.ed-img-empty { border: 1px dashed var(--divider); border-radius: 10px; padding: 22px 14px; text-align: center; font-size: 12px; color: var(--muted); line-height: 1.8; }
.ed-img-empty span { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); }
.ed-img-list { display: flex; flex-direction: column; gap: 8px; }
.ed-img-item { display: grid; grid-template-columns: 48px 1fr auto; align-items: center; gap: 10px; padding: 8px; background: var(--surface); border: 1px solid var(--divider); border-radius: 10px; transition: border-color 0.18s; }
.ed-img-item:hover { border-color: var(--border); }
.ed-img-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: var(--bg-sub); }
.ed-img-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.ed-img-meta b { font-size: 12.5px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ed-img-rm { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 6px; color: var(--muted-2); font-size: 16px; transition: all 0.18s; }

/* Inline image in preview + article body */

.md-fig figcaption { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2); margin-top: 10px; text-align: center; }

/* ============ IMAGE ALIGNMENT ============ */
.md-fig { margin: 36px 0; }
.md-fig.align-center { max-width: 100%; margin-left: auto; margin-right: auto; }
.md-fig.align-wide { width: calc(100% + 160px); margin-left: -80px; margin-right: -80px; max-width: none; }

.md-fig.align-left { float: left; width: 48%; margin: 8px 28px 20px 0; clear: left; }
.md-fig.align-right { float: right; width: 48%; margin: 8px 0 20px 28px; clear: right; }
.ed-preview .md-fig.align-full { margin-left: -48px; margin-right: -48px; width: calc(100% + 96px); left: 0; right: 0; position: static; }
.ed-preview .md-fig.align-wide { width: calc(100% + 40px); margin-left: -20px; margin-right: -20px; }

/* Insert popover */
.ed-insert-wrap { position: relative; display: inline-block; }
.ed-insert-pop { position: absolute; top: calc(100% + 8px); right: 0; z-index: 20; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); min-width: 240px; }
.ed-insert-head { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 10px; }

.ed-insert-pick { width: 100%; padding: 8px 10px; background: var(--ink); color: var(--bg); border-radius: 8px; font-size: 12px; font-weight: 500; letter-spacing: 0.02em; }
.ed-insert-pick:hover { background: var(--accent); }
.ed-insert-foot { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted-2); margin-top: 8px; text-align: center; }

/* Align row */
.ed-align { display: inline-flex; gap: 2px; padding: 2px; border-radius: 8px; background: var(--bg-sub); border: 1px solid var(--divider); }
.ed-align-btn { width: 26px; height: 24px; display: grid; place-items: center; border-radius: 5px; color: var(--muted-2); transition: all 0.15s; }
.ed-align-btn:hover { color: var(--ink); }
.ed-align-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
[data-theme="dark"] .ed-align-btn.active { background: var(--ink); }
.ed-align.compact { margin-top: 4px; }
.ed-align.compact .ed-align-btn { width: 22px; height: 20px; }
.ed-align.compact .ed-align-btn svg { width: 11px; height: 11px; }

/* ============ HOME · ABOUT ============ */
.about-home { padding: 8vh 0 4vh; }
.about-home-grid { display: grid; grid-template-columns: 240px 1fr; gap: 56px; padding: 40px 0; border-top: 1px solid var(--divider); border-bottom: 1px solid var(--divider); align-items: start; }
.about-avatar { display: flex; flex-direction: column; gap: 18px; }
.about-avatar .av { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, color-mix(in oklch, var(--accent) 30%, var(--bg-sub)), var(--bg-sub)); position: relative; border: 1px solid var(--border); }
.about-avatar .av::after { content: "YL"; position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--f-display); font-style: italic; font-weight: 500; font-size: 56px; color: var(--ink-2); letter-spacing: -0.04em; }
.about-avatar .av-meta { display: flex; flex-direction: column; gap: 4px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); padding-left: 6px; }
.about-avatar .av-meta span:first-child { color: var(--ink); letter-spacing: 0.22em; }
.about-text { max-width: 60ch; }
.about-text p { font-family: var(--f-display); font-size: 22px; line-height: 1.6; letter-spacing: -0.005em; color: var(--ink); font-weight: 400; }
.about-text p.about-p2 { font-size: 17px; line-height: 1.75; color: var(--ink-2); margin-top: 18px; font-family: var(--f-body); letter-spacing: 0; }
.about-socials { margin-top: 28px; display: flex; align-items: center; gap: 12px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.about-socials a { color: var(--ink-2); transition: color 0.18s; }
.about-socials a:hover { color: var(--accent); }
.about-socials .sep { color: var(--muted-2); }
@media (max-width: 900px) {

  .about-avatar { flex-direction: row; align-items: center; gap: 20px; }

  .about-avatar .av::after { font-size: 30px; }
  .about-text p { font-size: 18px; }

}

/* ============ ARTICLES PAGE ============ */
.art-page { padding-top: 96px; min-height: 100vh; }
.art-page-head { padding: 40px 0 56px; border-bottom: 1px solid var(--divider); }
.aph-eyebrow { display: flex; gap: 20px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 28px; }
.aph-eyebrow span:first-child { color: var(--ink); }
.art-page-head h1 { font-family: var(--f-display); font-size: clamp(52px, 7vw, 108px); font-weight: 500; letter-spacing: -0.04em; line-height: 0.95; margin-bottom: 18px; }
.art-page-head .lede { font-size: 17px; color: var(--muted); max-width: 46ch; line-height: 1.65; }

.art-page-body { display: grid; grid-template-columns: 260px 1fr; gap: 64px; padding: 48px 0 120px; align-items: start; }

/* RAIL */
.art-rail { position: sticky; top: 96px; display: flex; flex-direction: column; gap: 28px; max-height: calc(100vh - 120px); overflow-y: auto; padding-right: 6px; margin-right: -6px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.art-rail::-webkit-scrollbar { width: 6px; }
.art-rail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.art-rail::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
.art-rail-search { position: relative; }
.art-rail-search input { width: 100%; padding: 10px 36px 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--ink); font-size: 13px; font-family: var(--f-body); transition: border-color 0.18s; }
.art-rail-search input:focus { outline: none; border-color: var(--accent); }
.art-rail-search button { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 6px; color: var(--muted-2); display:grid; place-items:center; }
.art-rail-search button:hover { background: var(--bg-sub); color: var(--ink); }
.art-rail-head { display: flex; justify-content: space-between; align-items: baseline; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2); padding-bottom: 6px; border-bottom: 1px solid var(--divider); }
.art-rail-head .clear { font-family: var(--f-mono); font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
.art-rail-group { display: flex; flex-direction: column; gap: 10px; }
.art-rail-group h5 { font-family: var(--f-body); font-size: 12px; font-weight: 500; color: var(--ink); letter-spacing: 0.02em; margin: 0; }
.art-radio-row { display: flex; flex-wrap: wrap; gap: 4px; }
.art-chip { padding: 5px 10px; border-radius: 999px; font-size: 11.5px; color: var(--muted); border: 1px solid var(--divider); background: transparent; transition: all 0.15s; }
.art-chip:hover { color: var(--ink); border-color: var(--border); }
.art-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.art-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2); cursor: none; padding: 4px 0; }
.art-check:hover { color: var(--ink); }
.art-check input { position: absolute; opacity: 0; pointer-events: none; }
.art-check .box { width: 14px; height: 14px; border: 1px solid var(--border); border-radius: 3px; position: relative; flex-shrink: 0; transition: all 0.15s; }
.art-check input:checked + .box { background: var(--accent); border-color: var(--accent); }
.art-check input:checked + .box::after { content:''; position:absolute; left:3px; top:0px; width:5px; height:8px; border:solid var(--bg); border-width:0 1.5px 1.5px 0; transform:rotate(45deg); }
.art-check .l { flex: 1; }
.art-check .rt { font-family: var(--f-mono); font-size: 10px; color: var(--muted-2); }
.art-tag-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.art-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 6px; font-size: 11.5px; color: var(--muted); border: 1px solid var(--divider); transition: all 0.15s; }
.art-tag:hover { color: var(--ink); border-color: var(--border); }
.art-tag.active { background: color-mix(in oklch, var(--accent) 12%, transparent); color: var(--accent); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); }
.art-tag .n { font-family: var(--f-mono); font-size: 10px; color: var(--muted-2); }

/* MAIN */
.art-page-main { min-width: 0; }
.art-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding-bottom: 18px; border-bottom: 1px solid var(--divider); margin-bottom: 28px; flex-wrap: wrap; }
.art-tb-left { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; min-width: 0; }
.art-tb-count { font-family: var(--f-display); font-size: 22px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.art-tb-count em { font-family: var(--f-mono); font-size: 11px; font-style: normal; color: var(--muted-2); letter-spacing: 0.14em; text-transform: uppercase; margin-left: 4px; }
.art-active-filters { display: flex; flex-wrap: wrap; gap: 5px; }
.art-af { display: inline-flex; align-items: center; gap: 5px; padding: 3px 5px 3px 8px; border-radius: 5px; background: var(--bg-sub); font-family: var(--f-mono); font-size: 10.5px; color: var(--ink-2); letter-spacing: 0.04em; }
.art-af button { width: 14px; height: 14px; border-radius: 3px; color: var(--muted-2); display: grid; place-items: center; font-size: 13px; line-height: 1; }
.art-af button:hover { background: var(--surface); color: crimson; }
.art-tb-right { display: flex; gap: 6px; align-items: center; }
.art-seg { display: inline-flex; gap: 2px; padding: 2px; border-radius: 8px; background: var(--bg-sub); border: 1px solid var(--divider); }
.art-seg button { padding: 5px 10px; border-radius: 6px; font-size: 11.5px; color: var(--muted); transition: all 0.15s; }
.art-seg button:hover { color: var(--ink); }
.art-seg button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
[data-theme="dark"] .art-seg button.active { background: var(--ink); color: var(--bg); }
.art-seg-icon button { padding: 5px 8px; }

/* LIST (rows) */
.art-list { display: flex; flex-direction: column; }
.art-row { display: grid; grid-template-columns: 48px 112px 1fr auto; gap: 20px; padding: 24px 0; border-bottom: 1px solid var(--divider); align-items: start; }
.art-row-n { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted-2); padding-top: 32px; }
.art-row-thumb { display: block; aspect-ratio: 4 / 3; background: var(--bg-sub); border-radius: 4px; position: relative; overflow: hidden; transition: background 0.2s; }
.art-row-thumb::after { content: attr(data-tag); position: absolute; left: 8px; top: 8px; font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.art-row-thumb:hover { background: var(--bg-dim); }
.art-row-body { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.art-row-meta { display: flex; gap: 12px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); }
.art-row-body h3 { font-family: var(--f-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.3; }
.art-row-body h3 a { color: var(--ink); }
.art-row-body h3 a:hover { color: var(--accent); }
.art-row-body p { font-size: 14px; color: var(--muted); line-height: 1.65; max-width: 66ch; }
.art-row-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.mini-tag { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--muted); padding: 2px 6px; border-radius: 4px; }
.mini-tag:hover { color: var(--accent); background: color-mix(in oklch, var(--accent) 10%, transparent); }
.art-row-stats { display: flex; gap: 14px; font-family: var(--f-mono); font-size: 10.5px; color: var(--muted-2); letter-spacing: 0.1em; padding-top: 6px; }

/* GRID cards */
.art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px 24px; }
.art-card-g { display: flex; flex-direction: column; gap: 14px; }
.art-card-thumb { display: block; aspect-ratio: 4 / 3; background: var(--bg-sub); border-radius: 6px; position: relative; overflow: hidden; }
.art-card-thumb::after { content: attr(data-tag); position: absolute; left: 12px; top: 12px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); }
.art-card-thumb:hover { background: var(--bg-dim); }
.art-card-body { display: flex; flex-direction: column; gap: 8px; }
.art-card-meta { display: flex; gap: 8px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); }
.art-card-body h4 { font-family: var(--f-display); font-size: 18px; font-weight: 500; line-height: 1.35; letter-spacing: -0.005em; }
.art-card-body h4 a { color: var(--ink); }
.art-card-body h4 a:hover { color: var(--accent); }
.art-card-body p { font-size: 13px; color: var(--muted); line-height: 1.6; }
.art-card-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; }
.art-card-tags { display: flex; gap: 4px; }
.art-card-stats { display: flex; gap: 10px; font-family: var(--f-mono); font-size: 10px; color: var(--muted-2); letter-spacing: 0.08em; }

/* Empty */
.art-empty { padding: 80px 0; text-align: center; }
.art-empty-mark { font-family: var(--f-display); font-size: 80px; color: var(--muted-2); opacity: 0.3; line-height: 1; margin-bottom: 8px; }
.art-empty h3 { font-family: var(--f-display); font-size: 24px; font-weight: 500; margin-bottom: 6px; }
.art-empty p { color: var(--muted); margin-bottom: 18px; }
.art-empty-btn { padding: 10px 18px; background: var(--ink); color: var(--bg); border-radius: 8px; font-size: 13px; font-weight: 500; }
.art-empty-btn:hover { background: var(--accent); }

/* Pagination */
.art-pager { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 48px; }
.art-pager button { min-width: 34px; height: 34px; padding: 0 10px; border-radius: 8px; font-family: var(--f-mono); font-size: 12px; color: var(--muted); transition: all 0.15s; }
.art-pager button:hover { background: var(--bg-sub); color: var(--ink); }
.art-pager button.active { background: var(--ink); color: var(--bg); }
.art-pager-ellipsis { color: var(--muted-2); padding: 0 4px; }

/* Infinite sentinel */

@media (max-width: 900px) {
  .art-page-body { grid-template-columns: 1fr; gap: 40px; }
  .art-rail { position: static; }
}
