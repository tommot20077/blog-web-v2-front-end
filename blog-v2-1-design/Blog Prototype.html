.ap-avatar-col { display: flex; flex-direction: column; align-items: flex-start; }
.ap-avatar {
  width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, var(--ink-2), var(--ink));
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ap-avatar-init {
  font-family: var(--f-display);
  font-size: 36px; font-weight: 500;
  color: var(--bg);
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
.ap-eyebrow { margin-bottom: 12px; }
.ap-name {
  font-family: var(--f-display);
  font-size: clamp(42px, 5vw, 72px);
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  margin: 0 0 8px;
  color: var(--ink);
}
.ap-role {
  font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}
.ap-bio {
  font-size: 16px; line-height: 1.75;
  color: var(--ink-2);
  max-width: 60ch;
  margin-bottom: 24px;
}
.ap-stats {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
}
.ap-stat { display: flex; align-items: baseline; gap: 6px; }
.ap-stat-n {
  font-family: var(--f-display);
  font-size: 22px; font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.ap-stat-l {
  font-family: var(--f-mono);
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted-2);
}
.ap-stat-div { width: 1px; height: 20px; background: var(--border); }

.ap-social { display: flex; align-items: center; gap: 12px; }
.ap-social-link {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--muted);
  transition: all 0.15s;
}
.ap-social-link:hover { border-color: var(--ink); color: var(--ink); }

/* sections */
.ap-section { margin-top: 56px; }
.ap-section-head {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--divider);
  padding-bottom: 12px;
  margin-bottom: 24px;
}
.ap-sort { display: flex; gap: 4px; }
.ap-sort-btn {
  padding: 6px 12px; border-radius: 999px;
  font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted);
  border: 1px solid transparent;
  transition: all 0.15s;
}
.ap-sort-btn.active { border-color: var(--border); color: var(--ink); }

/* pinned grid */
.ap-pinned-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
}
.ap-pin-card {
  border: 1px solid var(--divider);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
  background: var(--surface);
}
.ap-pin-card:hover { border-color: var(--ink); transform: translateY(-2px); }
.ap-pin-thumb {
  aspect-ratio: 16/7;
  background: linear-gradient(135deg, var(--bg-sub), var(--bg));
  position: relative;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 12px;
  border-bottom: 1px solid var(--divider);
}
.ap-pin-thumb::before {
  content: attr(data-cat);
  position: absolute; top: 12px; left: 12px;
  font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 0.14em; color: var(--muted);
}
.ap-pin-n {
  font-family: var(--f-mono); font-size: 11px;
  color: var(--accent);
}
.ap-pin-body { padding: 16px; }
.ap-pin-title {
  font-family: var(--f-display);
  font-size: 20px; font-weight: 500;
  letter-spacing: -0.01em; line-height: 1.3;
  color: var(--ink); margin: 0 0 8px;
}
.ap-pin-excerpt {
  font-size: 13px; line-height: 1.65;
  color: var(--muted); margin: 0;
}

/* article list reuses .td-row */
.ap-row { grid-template-columns: 160px 1fr 40px; }

@media (max-width: 860px) {
  .ap-header { grid-template-columns: 1fr; gap: 28px; }
  .ap-avatar { width: 80px; height: 80px; }
  .ap-pinned-grid { grid-template-columns: 1fr; }
  .ap-row { grid-template-columns: 120px 1fr 32px; }
}

/* Author Profile toolbar */
.ap-section-head { flex-wrap: wrap; gap: 10px; }
.ap-tb-right { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

.ap-pin-star { position: absolute; top: 10px; right: 10px; font-family: var(--f-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); background: color-mix(in oklch, var(--accent) 14%, var(--surface)); padding: 3px 7px; border-radius: 999px; border: 1px solid color-mix(in oklch, var(--accent) 30%, var(--border)); }

/* ============ COMMENTS ============ */
.cm-section { padding: 72px 0 96px; border-top: 1px solid var(--border); margin-top: 0; }
.cm-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 36px; }
.cm-count { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }

/* Compose */
.cm-compose { margin-bottom: 48px; }
.cm-compose-top { display: flex; gap: 16px; align-items: flex-start; }
.cm-compose-right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; }
.cm-compose-foot { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 10px; }
.cm-foot-btn { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--divider); transition: all 0.15s; }
.cm-foot-btn:hover, .cm-foot-btn.active { color: var(--ink); border-color: var(--border); }
.cm-post-btn { padding: 8px 16px; background: var(--ink); color: var(--bg); border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; transition: transform 0.15s; }
.cm-post-btn:hover { transform: translateX(2px); }
.cm-post-btn.sm { padding: 6px 12px; font-size: 10.5px; }
.cm-textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--ink); font-family: var(--f-body); font-size: 14px; line-height: 1.7; resize: vertical; outline: none; transition: border-color 0.18s; cursor: none; }
.cm-textarea:focus { border-color: var(--accent); }
.cm-textarea.sm { rows: 3; font-size: 13px; }
.cm-preview-box { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); min-height: 80px; font-size: 14px; line-height: 1.7; }
.cm-empty-preview { color: var(--muted-2); font-style: italic; }

/* Avatar */
.cm-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; letter-spacing: 0.04em; }

/* Thread */
.cm-thread { display: flex; flex-direction: column; gap: 0; }
.cm-comment { display: grid; grid-template-columns: 36px 1fr; gap: 16px; padding: 24px 0; border-top: 1px solid var(--divider); }
.cm-comment.reply { padding: 16px 0; }
.cm-right { min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.cm-meta { display: flex; align-items: baseline; gap: 12px; }
.cm-name { font-family: var(--f-display); font-size: 14px; font-weight: 500; color: var(--ink); }
.cm-time { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2); }
.cm-body { font-size: 14.5px; line-height: 1.75; color: var(--ink-2); }
.cm-body code { font-family: var(--f-mono); font-size: 0.88em; background: var(--bg-sub); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--divider); }
.cm-body strong { color: var(--ink); font-weight: 600; }

/* Actions */
.cm-actions { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.cm-act { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border: 1px solid transparent; transition: all 0.15s; }
.cm-act:hover { color: var(--ink); border-color: var(--divider); }
.cm-act.liked { color: #c54235; }
[data-theme="dark"] .cm-act.liked { color: #ff8066; }
.cm-act.active { color: var(--ink); border-color: var(--border); }

/* Replies */
.cm-replies { display: flex; flex-direction: column; gap: 0; margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--divider); }
.cm-reply-compose { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.cm-show-more { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); padding: 8px 0; margin-top: 6px; transition: opacity 0.15s; }
.cm-show-more:hover { opacity: 0.75; }

/* Empty */
.cm-empty { padding: 48px 0; text-align: center; font-size: 14px; color: var(--muted); font-style: italic; }

/* ============ FOCUS MODE ============ */
.ed-shell.focus-mode { background: var(--bg); }
.ed-shell.focus-mode .ed-body { grid-template-columns: 1fr; padding: 0; }
.ed-shell.focus-mode .ed-body.no-meta { grid-template-columns: 1fr; }
.ed-shell.focus-mode .ed-body.mode-split { grid-template-columns: 1fr 1fr; }
.ed-shell.focus-mode .ed-cm { background: var(--bg); }
.ed-shell.focus-mode .ed-cm-inner { max-width: 760px; margin: 0 auto; }
.ed-shell.focus-mode .ed-cm textarea { padding: 40px 24px 80px; font-size: 16px; line-height: 1.85; }
.ed-shell.focus-mode .ed-pane-head { padding: 8px 12px; }
.ed-shell.focus-mode .ed-cm-footer { position: fixed; bottom: 56px; left: 0; right: 0; text-align: center; background: transparent; border: none; pointer-events: none; }

/* Focus floating bar */
.ed-focus-bar {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 14px;
  background: var(--glass); backdrop-filter: saturate(1.8) blur(22px);
  -webkit-backdrop-filter: saturate(1.8) blur(22px);
  border: 1px solid var(--glass-border);
  border-radius: 999px; padding: 8px 16px;
  box-shadow: var(--shadow-md); z-index: 50;
}
.ed-focus-wc { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }
.ed-focus-wc em { color: var(--muted-2); font-style: normal; }
.ed-focus-esc { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 5px 12px; border-radius: 999px; border: 1px solid var(--divider); transition: all 0.15s; }
.ed-focus-esc:hover { color: var(--ink); border-color: var(--border); }

/* Focus active button */
.ed-btn.active { background: var(--bg-sub); color: var(--ink); border-color: var(--border); }

/* ============ META TABS ============ */
.ed-meta-tabs { display: flex; gap: 2px; padding: 4px; background: var(--bg-sub); border-radius: 10px; margin-bottom: 20px; }
.ed-meta-tab { flex: 1; padding: 7px 10px; border-radius: 7px; font-size: 12.5px; color: var(--muted); transition: all 0.15s; text-align: center; }
.ed-meta-tab.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
[data-theme="dark"] .ed-meta-tab.active { background: var(--ink); color: var(--bg); }

/* ============ OUTLINE ============ */
.ed-outline { display: flex; flex-direction: column; gap: 2px; }
.ed-outline-empty { padding: 24px 8px; text-align: center; color: var(--muted); font-size: 12.5px; line-height: 1.6; }
.ed-outline-empty span { display: block; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-top: 6px; }
.ed-outline-item { display: flex; align-items: baseline; gap: 8px; padding: 7px 8px; border-radius: 6px; font-size: 13px; color: var(--ink-2); text-align: left; transition: all 0.15s; width: 100%; }
.ed-outline-item:hover { background: var(--bg-sub); color: var(--ink); }
.ed-outline-item.active { background: color-mix(in oklch, var(--accent) 12%, transparent); color: var(--accent); }
.ed-outline-icon { font-family: var(--f-mono); font-size: 11px; color: var(--muted-2); flex-shrink: 0; width: 14px; }
.ed-outline-item.active .ed-outline-icon { color: var(--accent); opacity: 0.7; }
.ed-outline-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.ed-outline-item.level-1 .ed-outline-text { font-weight: 500; }
.ed-outline-item.level-2 .ed-outline-text { font-size: 12.5px; }
.ed-outline-item.level-3 .ed-outline-text { font-size: 12px; color: var(--muted); }
.ed-outline-item.level-3.active .ed-outline-text { color: var(--accent); }

/* ============ SEARCH VIEW (C — Spotlight Grid) ============ */
.sv-page { min-height: 100vh; background: var(--bg); padding: 96px 32px 160px; }
.sv-wrap { max-width: 1160px; margin: 0 auto; }

/* search bar */
.sv-search {
  display: flex; align-items: center; gap: 16px;
  border-bottom: 2px solid var(--ink);
  padding: 14px 4px 16px;
  transition: border-color 0.2s;
}
.sv-search.focus { border-bottom-color: var(--accent); }
.sv-icon { color: var(--muted); flex-shrink: 0; transition: color 0.2s; }
.sv-search.focus .sv-icon { color: var(--accent); }
.sv-search input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--f-display);
  font-size: 38px; font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.sv-search input::placeholder { color: var(--muted-2); font-weight: 300; }

.sv-clear {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer;
  font-size: 20px; line-height: 1; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.sv-clear:hover { border-color: var(--ink); color: var(--ink); }

.sv-count {
  font-family: var(--f-mono); font-size: 12px;
  color: var(--muted-2); letter-spacing: 0.12em;
  padding: 6px 10px; border: 1px solid var(--divider);
  border-radius: 4px;
  white-space: nowrap;
}

/* meta row below search */
.sv-meta-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 4px 0;
  font-family: var(--f-mono);
  font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted-2);
}
.sv-meta-q { color: var(--muted); }

/* section */
.sv-section { margin-top: 56px; }
.sv-section-head {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--f-mono);
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted-2);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--divider);
  margin-bottom: 24px;
}
.sv-section-note { font-size: 9.5px; }

/* article cards */
.sv-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
}
.sv-card {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, background 0.2s;
  display: flex; flex-direction: column;
}
.sv-card:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
}

.sv-thumb {
  aspect-ratio: 16/9;
  background:
    linear-gradient(135deg, var(--bg-sub), var(--bg));
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 10px;
}
.sv-thumb::before {
  content: attr(data-tag);
  position: absolute; left: 10px; top: 10px;
  font-family: var(--f-mono);
  font-size: 10px; letter-spacing: 0.14em;
  color: var(--muted);
}
.sv-thumb-n {
  font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--muted-2);
  align-self: flex-end;
  margin-left: auto;
}

.sv-card h5 {
  font-family: var(--f-display);
  font-size: 15px; font-weight: 500;
  line-height: 1.4;
  letter-spacing: -0.005em;
  color: var(--ink);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sv-card h5 mark, .sv-tag-pill mark, .sv-author-n mark {
  background: color-mix(in oklch, var(--accent) 24%, transparent);
  color: var(--ink);
  border-radius: 2px; padding: 0 2px;
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}

.sv-card p {
  font-size: 12.5px; color: var(--muted);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
  flex: 1;
}

.sv-card-foot {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--f-mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted-2);
  padding-top: 10px;
  border-top: 1px solid var(--divider);
}
.sv-card-arr {
  font-size: 14px; color: var(--muted);
  transition: transform 0.2s, color 0.2s;
}
.sv-card:hover .sv-card-arr { color: var(--accent); transform: translateX(3px); }

/* tag pills */
.sv-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.sv-tag-pill {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-family: var(--f-body);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.sv-tag-pill:hover {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--bg);
}
.sv-tag-pill:hover .sv-tag-n { color: var(--bg); opacity: 0.6; }
.sv-tag-n {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--muted-2);
  letter-spacing: 0.04em;
}

/* authors */
.sv-authors {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.sv-author {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--divider);
  background: var(--surface);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  text-align: left;
  font-family: inherit;
  color: inherit;
}
.sv-author:hover { border-color: var(--ink); }
.sv-author-av {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.04em;
  color: var(--muted);
  text-transform: uppercase;
}
.sv-author-n {
  font-family: var(--f-display);
  font-size: 13.5px; font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}
.sv-author-r {
  font-family: var(--f-mono);
  font-size: 10px; letter-spacing: 0.06em;
  color: var(--muted-2);
}

/* chips (recent / popular / empty-state) */
.sv-empty { margin-top: 48px; }
.sv-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.sv-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 999px;
  font-family: var(--f-body);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
}
.sv-chip:hover {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--bg);
}
.sv-chip:hover .sv-chip-n, .sv-chip:hover .sv-chip-i {
  color: var(--bg); opacity: 0.55;
}
.sv-chip-n {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--muted-2);
  letter-spacing: 0.06em;
}
.sv-chip-i {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--muted-2);
}
.sv-link-btn {
  background: none; border: none;
  font-family: var(--f-mono);
  font-size: 9.5px; letter-spacing: 0.16em;
  color: var(--muted-2);
  text-transform: uppercase;
  cursor: pointer;
  padding: 0; text-decoration: underline;
  text-underline-offset: 3px;
}
.sv-link-btn:hover { color: var(--accent); }

/* no result */
.sv-noresult {
  margin-top: 80px;
  text-align: center;
  padding: 60px 20px;
}
.sv-noresult-mark {

  articleBody: `一個 Blog 的 Design System，不應該讓作者在發表前先被自己卡住。

這一篇想把過去三個月，我把整個 Blog 的 tokens 收斂成一份 800 行 \`tokens.css\` 的過程寫下來。結論先說：**減法遠比加法難**。

## §01. 問題的起點

最初我用 Tailwind 預設值跑了整個首頁，後台與內頁。短期看起來很方便，但：

- 每新增一個頁面，我會本能地開始微調間距、圓角、字重
- 三個月後再打開第一版 CSS，像在讀別人的文章
- 最糟的是：**同一種 shadow 出現了四個變形**

這跟品質無關。跟紀律有關。

## §02. 把「不加什麼」寫進規範

後來我做了一件事：在 tokens 的開頭寫了一段註解——

\`\`\`css
/* ============ TOKENS ============
 * 這份檔案不追求完整，追求「夠用」。
 * 新增前請先問自己：這個 token 真的無法用既有的表達嗎？
 * 能不能刪、不加、或合併，比能不能新增重要。
 * ============== */
\`\`\`

接著我把所有 shadow 砍到剩 3 個。間距只留 \`4 / 8 / 12 / 16 / 24 / 40 / 64 / 96\`。圓角只留 \`6 / 12 / 999\`。

剛砍完的那一週我寫不出新元件——因為每個既有設定都少了一點「剛剛好」。但第二週開始，寫頁面的速度變快了。我不再花 10 分鐘選 shadow，因為只有 3 個可以選。

## §03. 非對稱網格救了我

<script type="text/babel" data-presets="env,react">/* global React */

// ============ MARKDOWN RENDERER (tiny, no deps) ============
function renderMd(src) {
  if (!src) return '';
  const lines = src.split('\n');
  const out = [];
  let i = 0;
  const inline = s => s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g, (_,alt,url,meta) => {
      const align = (meta && meta.match(/align=(\w+)/)?.[1]) || 'center';
      return `<figure class="md-fig align-${align}"><img loading="lazy" decoding="async" src="${url}" alt="${alt||''}"/>${alt ? `<figcaption>${alt}</figcaption>` : ''}</figure>`;
    })
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  while (i < lines.length) {
    const l = lines[i];
    if (l.startsWith('```')) {
      const lang = l.slice(3).trim();
      const buf = []; i++;
      while (i < lines.length && !lines[i].startsWith('```')) { buf.push(lines[i]); i++; }
      i++;
      const esc = buf.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      out.push(`<pre data-lang="${lang}"><code>${esc}</code></pre>`);
      continue;
    }
    if (l.startsWith('# ')) { out.push('<h1>'+inline(l.slice(2))+'</h1>'); i++; continue; }
    if (l.startsWith('## ')) { out.push('<h2 id="'+ l.slice(3).replace(/\s+/g,'-').replace(/[^\w\u4e00-\u9fa5-]/g,'').toLowerCase() +'">'+inline(l.slice(3))+'</h2>'); i++; continue; }
    if (l.startsWith('### ')) { out.push('<h3>'+inline(l.slice(4))+'</h3>'); i++; continue; }
    if (l.startsWith('> ')) { out.push('<blockquote>'+inline(l.slice(2))+'</blockquote>'); i++; continue; }
    if (l.trim() === '---') { out.push('<hr/>'); i++; continue; }
    if (/^-\s/.test(l)) {
      const items = [];
      while (i < lines.length && /^-\s/.test(lines[i])) { items.push('<li>'+inline(lines[i].slice(2))+'</li>'); i++; }
      out.push('<ul>'+items.join('')+'</ul>');
      continue;
    }
    if (l.trim() === '') { i++; continue; }
    const para = [l]; i++;
    while (i < lines.length && lines[i].trim() !== '' && !/^(#|>|-|```)/.test(lines[i])) { para.push(lines[i]); i++; }
    out.push('<p>'+inline(para.join(' '))+'</p>');
  }
  return out.join('\n');
}

<script type="text/babel" data-presets="env,react">/* global React */
const { useState, useEffect, useRef, useMemo } = React;

// ============ MOCK ELASTICSEARCH ADAPTER ============
// Replace this with: fetch('/api/search?q=' + q).then(r => r.json())
function mockSearch(query) {
  const q = (query || '').trim().toLowerCase();
  const C = window.BLOG_CONTENT || {};
  const articles = [...(C.trending || []), ...(C.latest || [])];
  const tags = C.tags || [];
  const authors = C.authors || [];

  if (!q) return { articles: [], tags: [], authors: [], total: 0 };

  const hitArticles = articles
    .map(a => {
      const title = (a.title || '').toLowerCase();
      const excerpt = (a.excerpt || a.lede || '').toLowerCase();
      const cat = (a.category || a.tag || '').toLowerCase();
      const score =
        (title.includes(q) ? 10 : 0) +
        (excerpt.includes(q) ? 5 : 0) +
        (cat.includes(q) ? 3 : 0);
      return score > 0 ? { ...a, _score: score } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b._score - a._score);

  const hitTags = tags.filter(t => t.name.toLowerCase().includes(q));
  const hitAuthors = authors.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.role || '').toLowerCase().includes(q) ||
    (a.handle || '').toLowerCase().includes(q)
  );

  return {
    articles: hitArticles,
    tags: hitTags,
    authors: hitAuthors,
    total: hitArticles.length + hitTags.length + hitAuthors.length
  };
}

// Highlight query in text
function highlight(text, q) {
  if (!q || !text) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
  const parts = text.split(re);
  return parts.map((p, i) =>
    re.test(p) ? React.createElement('mark', { key: i }, p) : p
  );
}

const POPULAR_QUERIES = ['tailwind', 'vue 3', 'tdd', 'design systems', 'markdown', 'vitest'];
const RECENT_KEY = 'blog.recentSearches';

function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch { return []; }
}
function addRecent(q) {
  if (!q || !q.trim()) return;
  const list = getRecent().filter(x => x !== q);
  list.unshift(q);
  localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, 6)));

// ============ CUSTOM CURSOR ============
function Cursor() {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    let x=window.innerWidth/2, y=window.innerHeight/2, rx=x, ry=y;
    const onMove = e => {
      x = e.clientX; y = e.clientY;
      if(dotRef.current){dotRef.current.style.transform=`translate(${x}px,${y}px) translate(-50%,-50%)`;}
    };
    const onOver = e => {
      const tgt = e.target.closest('a,button,[data-hover]');
      if (ringRef.current) ringRef.current.classList.toggle('hover', !!tgt);
      if (dotRef.current) dotRef.current.classList.toggle('hover', !!tgt);
      const isText = e.target.closest('input,textarea,[contenteditable]');
      if (ringRef.current) ringRef.current.classList.toggle('text', !!isText);
    };
    let paused = false;
    const onDown = e => { if (e.button === 1) { paused = true; } };
    const onUp = e => { if (e.button === 1) { paused = false; } };
    const tick = () => {
      if (!paused) { rx += (x-rx)*0.18; ry += (y-ry)*0.18; }
      if(ringRef.current) ringRef.current.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      requestAnimationFrame(tick);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseover', onOver);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    tick();
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseover', onOver); window.removeEventListener('mousedown', onDown); window.removeEventListener('mouseup', onUp); };
  }, []);
  return React.createElement(React.Fragment, null,
    React.createElement('div', { ref: dotRef, className: 'cursor-dot' }),
    React.createElement('div', { ref: ringRef, className: 'cursor-ring' })
  );
}

// ============ REVEAL HOOK ============
function useReveal() {
  useEffect(() => {
    const els = Array.from(document.querySelectorAll('.reveal:not(.in)'));
    // Reveal anything above the fold immediately on mount
    const vh = window.innerHeight;
    els.forEach(el => {
      const r = el.getBoundingClientRect();
      if (r.top < vh * 0.9) el.classList.add('in');
    });
    const remaining = els.filter(el => !el.classList.contains('in'));
    // Fallback: reveal everything after 1.5s if observer never fires
    const fallback = setTimeout(() => { remaining.forEach(el => el.classList.add('in')); }, 1500);
    if (!('IntersectionObserver' in window)) { remaining.forEach(el=>el.classList.add('in')); return () => clearTimeout(fallback); }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.08, rootMargin: '0px 0px -5% 0px' });
    remaining.forEach(el => io.observe(el));
    return () => { io.disconnect(); clearTimeout(fallback); };
  }, []);
}

    clearTimeout(hideTimer.current);

// ============ APP ============
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "font": "space",
  "accent": "on",
  "accentColor": "#5B8DEF",
  "cursor": "ring"
}/*EDITMODE-END*/;

function App() {
  const VALID_VIEWS = ['home','articles','article','login','register','my','editor','search','tag','author','settings','404','500'];
  const [view, setView] = useState(() => {
    const v = localStorage.getItem('blog.view') || 'home';
    return VALID_VIEWS.includes(v) ? v : 'home';
  });
  const [uuid, setUuid] = useState(() => localStorage.getItem('blog.uuid') || 'a1');
  const go = (v, id) => {
    if (v === 'tag') { setUuid(id); setView('tag'); return; }
    if (v === 'author') { setUuid(id); setView('author'); return; }
    if (v === 'editor-new') { setView('editor'); setUuid('new'); return; }
    if (v === 'my-drafts') { setView('my'); return; }
    if (v === 'my-published') { setView('my'); return; }
    if (v === 'my-archived') { setView('my'); return; }
    if (v === 'stats') { setView('my'); return; }
    if (id) setUuid(id);
    setView(v);
  };
  useEffect(() => { localStorage.setItem('blog.uuid', uuid); }, [uuid]);
  const [state, setState] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('blog.tweaks')||'{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('blog.view', view); }, [view]);
  useEffect(() => { localStorage.setItem('blog.tweaks', JSON.stringify(state)); }, [state]);

  // ⌘K / Ctrl+K to open Search
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setView('search');
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // apply state to html
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', state.theme);
    document.documentElement.setAttribute('data-font', state.font);
    document.documentElement.setAttribute('data-accent', state.accent);
    document.documentElement.setAttribute('data-cursor', state.cursor || 'ring');
    if (state.accent === 'on') {
      document.documentElement.style.setProperty('--accent', state.accentColor);
    } else {
      document.documentElement.style.removeProperty('--accent');
    }
  }, [state]);

  // edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // scroll to top on view change
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [view]);

  const toggleTheme = () => setState(s => ({ ...s, theme: s.theme==='dark'?'light':'dark' }));

  return React.createElement(React.Fragment, null,
    React.createElement(Cursor),
    (view === 'home' || view === 'articles' || view === 'login' || view === 'register' || view === 'article' || view === 'search' || view === 'tag' || view === 'author')
      && React.createElement(Navbar, { view, setView, theme: state.theme, toggleTheme }),
    view === 'home' ? React.createElement(Home, { go })
    : (view === 'login' || view === 'register') ? React.createElement(Auth, { mode: view, setMode: setView })
    : view === 'my' ? React.createElement(window.BlogViews.MyArticles, { go })
    : view === 'editor' ? React.createElement(window.BlogViews.Editor, { uuid, go })
    : view === 'article' ? React.createElement(window.BlogViews.ArticleDetail, { uuid, go, fromEditor: false })
    : view === 'articles' ? React.createElement(window.ArticlesPage, { go, preFilter: uuid })
    : view === 'search' ? React.createElement(window.SearchView, { go, initialQuery: uuid && uuid.startsWith('q:') ? uuid.slice(2) : '' })
    : view === 'tag' ? React.createElement(window.BlogViews.TagDetail, { tag: uuid, go })
    : view === 'author' ? React.createElement(window.BlogViews.AuthorProfile, { handle: uuid, go })
    : view === 'settings' ? React.createElement(window.SettingsView, { go })
    : view === '404' ? React.createElement(ErrorPage, { code: 404, go })
    : view === '500' ? React.createElement(ErrorPage, { code: 500, go })
    : React.createElement(Home, { go }),
    React.createElement(ViewSwitch, { view, setView, go }),
    editMode && React.createElement(TweaksPanel, {
      state, setState,
      hidden: false,
      onClose: () => setEditMode(false),
    })
  );
}

// Always render panel (visible when edit mode on)
function RootApp() {
  return React.createElement(App);
}

root.render(React.createElement(RootApp));
