<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

const POST = {
  title: '把整個 Blog 收斂成 800 行 tokens。',
  slug: 'design-system-rewrite',
  description: '三個月、兩次重寫、一個 design system。我把 1,820 行的 v1 砍成 802 行的 v2，並把「不加什麼」寫進規範。',
  author: 'Yuan Luca',
  publishedAt: '2026-04-15T09:00:00+08:00',
  updated: '2026 · 04 · 15',
  url: 'https://myblogweb.com/posts/design-system-rewrite',
  image: 'https://myblogweb.com/og/design-system-rewrite.png',
  tags: ['design-system', 'css', 'tokens', 'frontend'],
  body: `三個月前的 design system 是 1,820 行。這次改完是 802 行。少了 1,000 行，可是在 Figma 上拉新頁面比之前快兩倍。

這不是因為我把 token 砍掉，而是因為我把每一個 token 的存在理由都寫進了 comment。沒有理由的就刪了。

## 緣起：為什麼是 800 行

v1 寫於 2025 年 11 月，當時我還在用 9 個灰階、5 個藍、4 個強調紅。那時的我以為：「token 越多越好」。

結果是：每次設計新頁面，我都要花 10 分鐘在 Figma 裡決定該用哪一階灰。設計越靈活，反而越慢。

## 從顏色到節奏

我把整套 tokens 拆成五類：color, type, space, radius, motion。每一類都遵守同一個原則：少於 8 個變體，名稱用語義（\`--ink\`），不要用尺寸（\`--gray-900\`）。

### 色階只用三檔

\`--ink\` 配 \`--ink-2\` 配 \`--muted\`。其他全部是 mix-in。

### 字級是 clamp()，不是 8 階

RWD 不是「斷點換字級」，而是「在斷點之間平滑過渡」。我用 \`clamp(min, vw, max)\` 做了 6 個字級，覆蓋 320 → 1920。

> 真正的響應式不是把元件改瘦，而是讓字級自己適應。

## 踩過的坑

第一個坑：accent 色被當成 brand 色用。第二個坑：dark mode 用 invert 出來，結果 #5B8DEF 在深底上變成噁心的螢光紫。

## 結語：把不加什麼寫進規範

「禁止」比「容許」更重要。我在 v2 寫了 12 條 don'ts；它們比所有 do's 都更常被引用。`,
};

const POST_MD = `---

`;

  return (
    <header className="bar">
      <a href="#" className="brand"><span className="mk"></span><span>MY BLOG WEB.</span></a>
      <div className="right">
        <button className="cmd-trigger" onClick={onCmd}>
          <span>Search · ⌘K</span>
          <kbd>⌘K</kbd>
        </button>
        <button className="theme-tog" onClick={toggle} aria-label="Toggle theme">
          {theme === 'dark'
            ? <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            : <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>}
        </button>
      </div>
    </header>
  );
}

function Hero({ onCmd, onMd }) {
  return (
    <section className="hero wrap">
      <div className="eyebrow">§ refinements v3 · AI-readable · SEO-ready</div>
      <h1>讓<em>機器</em>跟<em>人</em>都<br/><span className="accent">讀得懂</span>的 Blog。</h1>
      <p>第三輪改稿。這次補上 AI 友善（llms.txt、Markdown 鏡像、JSON-LD）、SEO（OG、Twitter card、sitemap、RSS、JSON Feed）、Command Palette（⌘K）、自動 TOC、reading time、footnote、code block、image lightbox、a11y skip-link 與 reduced motion。</p>
      <div className="hero-cta">
        <button className="pri" onClick={onCmd}>Open command palette <kbd>⌘K</kbd></button>
        <button className="sec" onClick={onMd}>View as Markdown</button>
      </div>

}

function ReadingProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.getElementById('article-body');
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const total = el.offsetHeight - window.innerHeight;
      setPct(Math.max(0, Math.min(100, (-rect.top / total) * 100)));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="read-progress" style={{width: pct + '%'}} />;
}

function StickyTOC({ items, active }) {
  return (
    <nav className="toc-sticky" aria-label="On this page">
      <div className="head">§ on this page</div>
      {items.map(it => (
        <a key={it.id}
           href={'#' + it.id}
           className={(active === it.id ? 'active ' : '') + 'lvl-' + it.level}
           onClick={e => { e.preventDefault(); const el = document.getElementById(it.id); if (el) window.scrollTo({top: el.offsetTop - 80, behavior: 'smooth'}); }}
        >{it.label}</a>
      ))}
    </nav>
  );
}

function ArticleSection() {
  const { items, active } = window.useAutoTOC('#article-body');
  const minutes = window.readingTime(POST.body, 220);
  const words = (POST.body.match(/\b\w+\b/g) || []).length + Math.floor(POST.body.length / 2);

  return (
    <section id="main" className="section">
      <div className="wrap">
        <div className="section-head">
          <span className="num">§ 01 — Article</span>
          <h2>{POST.title}</h2>
          <span className="r">{POST.publishedAt.slice(0,10)}</span>
        </div>

        <window.ArticleMeta
          minutes={minutes}
          words={words}
          updated={POST.updated}
          tags={POST.tags}
        />

        <div className="article-wrap">
          <div className="article-body" id="article-body">
            <p>三個月前的 design system 是 1,820 行。這次改完是 802 行。少了 1,000 行，可是在 Figma 上拉新頁面比之前快兩倍。</p>

            <p>這不是因為我把 token 砍掉，而是因為我把<em>每一個 token 的存在理由</em>
              <window.Footnote n={1}>「存在理由」=<code>/* WHY: 用於 caption / meta / hint */</code> 這種 comment。沒寫的就是沒理由。</window.Footnote>
              都寫進了 comment。沒有理由的就刪了。
            </p>

            <h2>緣起：為什麼是 800 行</h2>
            <p>v1 寫於 2025 年 11 月，當時我還在用 9 個灰階、5 個藍、4 個強調紅。那時的我以為：「token 越多越好」。</p>
            <p>結果是：每次設計新頁面，我都要花 10 分鐘在 Figma 裡決定該用哪一階灰
              <window.Footnote n={2}>後來我把這 10 分鐘的決策成本量化：每月 22 個工作天 × 10 分鐘 = 3.6 小時純粹的「選顏色」時間。</window.Footnote>
              。設計越靈活，反而越慢。</p>

            <h2>從顏色到節奏</h2>
            <p>我把整套 tokens 拆成五類：color, type, space, radius, motion。每一類都遵守同一個原則：少於 8 個變體，名稱用語義（<code>--ink</code>），不要用尺寸（<code>--gray-900</code>）。</p>

            <h3>色階只用三檔</h3>
            <p><code>--ink</code> 配 <code>--ink-2</code> 配 <code>--muted</code>。其他全部是 mix-in。</p>

            <window.CodeBlock lang="css" filename="tokens.css">{`:root {
  --ink: #0a0a0b;
  --ink-2: #2a2a2c;
  --muted: #6b6b70;
  --accent: #5B8DEF;
  /* 任何中間階都用 color-mix() */
  --line: color-mix(in oklab, var(--ink) 12%, transparent);
}`}</window.CodeBlock>

            <h3>字級是 clamp()，不是 8 階</h3>
            <p>RWD 不是「斷點換字級」，而是「在斷點之間平滑過渡」。我用 <code>clamp(min, vw, max)</code> 做了 6 個字級，覆蓋 320 → 1920。</p>

            <blockquote>真正的響應式不是把元件改瘦，而是讓字級自己適應。</blockquote>

            <h2>踩過的坑</h2>
            <p>第一個坑：accent 色被當成 brand 色用。第二個坑：dark mode 用 invert 出來，結果 #5B8DEF 在深底上變成噁心的螢光紫。</p>

            <p>所以 v2 改用 OKLCH 算對應的 dark variant：</p>
            <window.CodeBlock lang="css" filename="dark.css">{`[data-theme="dark"] {
  --accent: oklch(from #5B8DEF calc(l + 0.1) c h);
}`}</window.CodeBlock>

            <h2>結語：把不加什麼寫進規範</h2>
            <p>「禁止」比「容許」更重要。我在 v2 寫了 12 條 don'ts；它們比所有 do's 都更常被引用。</p>
          </div>
          <StickyTOC items={items} active={active} />
        </div>
      </div>
    </section>
  );
}

function AISeoSection({ onOpenMd }) {
  return (
    <section className="section">
      <div className="wrap">
        <div className="section-head">
          <span className="num">§ 02 — AI &amp; SEO</span>
          <h2>給機器讀的版本。</h2>
          <span className="r">JSON-LD · RSS · llms.txt</span>
        </div>
        <p className="intro">每篇文章都同時提供 HTML 與 Markdown 兩種版本。HTML 給人，Markdown 給 LLM 跟爬蟲。JSON-LD 寫進 <code>&lt;head&gt;</code>，OG 與 Twitter card 自動產生。</p>

        <window.AIReadableBlock onOpenMd={onOpenMd} />

        <div style={{marginTop:32}}>
          <div className="section-head" style={{marginBottom:16}}>
            <span className="num">§ 02b — OG image</span>
            <h2 style={{fontSize:'clamp(20px,2.4vw,26px)'}}>分享卡片自動產生器。</h2>
            <span className="r">1200 × 630</span>
          </div>
          <p className="intro">在 client-side 用 canvas 渲染。換標題即時更新，可下載 PNG。或在 build 時用同一段邏輯產生靜態 OG 圖。</p>
          <window.OGImageGenerator
            title={POST.title}
            subtitle={POST.description}
            author={POST.author}
            accent="#5B8DEF"
          />
        </div>
      </div>
    </section>
  );
}

function MetaPreviewSection() {
  const head = `<!-- Auto-generated <head> tags -->
<title>${POST.title} · MY BLOG WEB.</title>
<meta name="description" content="${POST.description}" />
<meta name="author" content="${POST.author}" />
<meta name="keywords" content="${POST.tags.join(', ')}" />
<link rel="canonical" href="${POST.url}" />

<!-- Open Graph -->
<meta property="og:type" content="article" />
<meta property="og:title" content="${POST.title}" />
<meta property="og:description" content="${POST.description}" />
<meta property="og:image" content="${POST.image}" />
<meta property="og:url" content="${POST.url}" />
<meta property="article:published_time" content="${POST.publishedAt}" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="${POST.title}" />
<meta name="twitter:description" content="${POST.description}" />
<meta name="twitter:image" content="${POST.image}" />

<!-- AI-friendly mirrors -->
<link rel="alternate" type="text/markdown" href="post.md" />
<link rel="alternate" type="application/rss+xml" href="feed.xml" />
<link rel="alternate" type="application/json" href="feed.json" />`;

  const jsonLd = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": POST.title,
    "description": POST.description,
    "image": POST.image,
    "datePublished": POST.publishedAt,
    "author": { "@type": "Person", "name": POST.author, "url": "https://myblogweb.com/about" },
    "publisher": { "@type": "Organization", "name": "MY BLOG WEB.", "logo": { "@type": "ImageObject", "url": "https://myblogweb.com/logo.png" } },
    "mainEntityOfPage": { "@type": "WebPage", "@id": POST.url },
    "keywords": POST.tags.join(", "),
  }, null, 2);

  const llmsTxt = `# MY BLOG WEB.

> 個人技術寫作。Design system, Vue, CSS, frontend。每月一篇深度文章。

## Recent posts

- [${POST.title}](${POST.url}.md): ${POST.description}
- [灰階不是偷懶的藉口](https://myblogweb.com/posts/grayscale.md): 一個 #f4f4f4 + 一個 #0a0a0b 就足夠。
- [我為什麼離開 Pinia](https://myblogweb.com/posts/leaving-pinia.md): 三個月後的回顧。

## About

- Author: ${POST.author}
- License: CC BY-SA 4.0
- Contact: hi@myblogweb.com`;

  return (
    <section className="section">
      <div className="wrap">
        <div className="section-head">
          <span className="num">§ 03 — Generated artefacts</span>
          <h2>SEO 與 AI 產出的三個檔案。</h2>
          <span className="r">head · jsonld · llms.txt</span>
        </div>

        <window.CodeBlock lang="html" filename="<head> tags">{head}</window.CodeBlock>
        <window.CodeBlock lang="json" filename="JSON-LD · schema.org/Article">{jsonLd}</window.CodeBlock>
        <window.CodeBlock lang="markdown" filename="/llms.txt">{llmsTxt}</window.CodeBlock>
      </div>
    </section>
  );
}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('v3.theme') || 'light');
  const [cpOpen, setCpOpen] = useState(false);
  const [hkOpen, setHkOpen] = useState(false);
  const [mdOpen, setMdOpen] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('v3.theme', theme);
  }, [theme]);

  // Hotkeys
  window.useHotkeys({
    'mod+k': () => setCpOpen(true),
    '?':     () => setHkOpen(true),
    'mod+m': () => setMdOpen(true),
    'g+h':   () => window.scrollTo({top: 0, behavior: 'smooth'}),
  });

  // Command palette items
  const cmdItems = useMemo(() => ([
    {
      label: 'Pages',
      items: [
        { id: 'home', icon: '⌂', label: 'Home', hint: '回到首頁', shortcut: 'g+h', run: () => window.scrollTo({top:0, behavior:'smooth'}) },
        { id: 'article', icon: '§', label: 'Read article', hint: POST.title, run: () => document.getElementById('main').scrollIntoView({behavior:'smooth'}) },
        { id: 'ai', icon: '◇', label: 'AI & SEO endpoints', hint: 'Markdown, llms.txt, RSS', run: () => document.querySelectorAll('.section')[1]?.scrollIntoView({behavior:'smooth'}) },
        { id: 'og', icon: '▭', label: 'OG image generator', run: () => document.querySelectorAll('.section')[1]?.scrollIntoView({behavior:'smooth'}) },
      ],
    },
    {
      label: 'Actions',
      items: [
        { id: 'md', icon: '↓', label: 'View as Markdown', hint: '把這篇文章複製成 .md', shortcut: 'mod+m', run: () => setMdOpen(true) },
        { id: 'theme', icon: '☾', label: 'Toggle theme', hint: theme === 'dark' ? 'switch to light' : 'switch to dark', run: () => setTheme(t => t === 'dark' ? 'light' : 'dark') },
        { id: 'help', icon: '?', label: 'Keyboard shortcuts', shortcut: '?', run: () => setHkOpen(true) },
        { id: 'copy-link', icon: '⌘', label: 'Copy article link', run: () => navigator.clipboard.writeText(POST.url) },
      ],
    },
    {
      label: 'Articles',
      items: [
        { id: 'a1', icon: '✎', label: '把整個 Blog 收斂成 800 行 tokens。', hint: '2026 · 04 · 15', run: () => null },
        { id: 'a2', icon: '✎', label: '灰階不是偷懶的藉口。', hint: '2026 · 04 · 02', run: () => null },
        { id: 'a3', icon: '✎', label: '我為什麼離開 Pinia。', hint: '2026 · 03 · 26', run: () => null },
        { id: 'a4', icon: '✎', label: 'useTheme() 的第三次重構。', hint: '2026 · 04 · 08', run: () => null },
      ],
    },
  ]), [theme]);

  const hkGroups = [
    { label: 'Navigation', items: [
      { label: 'Open command palette', keys: '⌘+K' },
      { label: 'Go home', keys: 'g+h' },
      { label: 'Show this help', keys: '?' },
    ]},
    { label: 'Article', items: [
      { label: 'View as Markdown', keys: '⌘+M' },
      { label: 'Copy section link', keys: '⌘+L' },
      { label: 'Toggle theme', keys: '⌘+J' },
    ]},
    { label: 'Editor', items: [
      { label: 'Save draft', keys: '⌘+S' },
      { label: 'Publish', keys: '⌘+↵' },
      { label: 'Slash command', keys: '/' },
    ]},
  ];

  return (
    <window.LightboxProvider>
      <window.SEO
        title={POST.title + ' · MY BLOG WEB.'}
        description={POST.description}
        image={POST.image}
        url={POST.url}
        type="article"
        author={POST.author}
        publishedAt={POST.publishedAt}
        tags={POST.tags}
      />
      <window.StructuredData data={{
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": POST.title,
        "description": POST.description,
        "image": POST.image,
        "datePublished": POST.publishedAt,
        "author": { "@type": "Person", "name": POST.author },
        "publisher": { "@type": "Organization", "name": "MY BLOG WEB." },
        "mainEntityOfPage": { "@type": "WebPage", "@id": POST.url },
      }} />
      <ReadingProgress />
      <TopBar theme={theme} toggle={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} onCmd={() => setCpOpen(true)} />
      <Hero onCmd={() => setCpOpen(true)} onMd={() => setMdOpen(true)} />
      <ArticleSection />
      <AISeoSection onOpenMd={() => setMdOpen(true)} />
      <MetaPreviewSection />
      <footer className="footer">
        <span>© 2026 · MY BLOG WEB. — refinement pass v3</span>
        <span>⌘K · ? · ⌘M</span>
      </footer>

      <window.CommandPalette open={cpOpen} onClose={() => setCpOpen(false)} items={cmdItems} />
      <window.HotkeysHelp open={hkOpen} onClose={() => setHkOpen(false)} groups={hkGroups} />
      <window.MarkdownView open={mdOpen} onClose={() => setMdOpen(false)} markdown={POST_MD} title={POST.title} />
    </window.LightboxProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
